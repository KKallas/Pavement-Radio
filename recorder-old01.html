<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pavement Radio — Recorder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;padding-bottom:64px}
nav.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#1a1a1a;border-top:1px solid #333;display:flex;z-index:9999;padding-bottom:env(safe-area-inset-bottom,0)}
nav.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;color:#666;font-size:10px;gap:2px;transition:color .15s}
nav.bottom-nav a.active{color:#5cb85c}
nav.bottom-nav a:active{opacity:.6}
nav.bottom-nav svg{width:22px;height:22px;fill:currentColor}
header{padding:16px;border-bottom:1px solid #333}
header h1{font-size:1.3em}
header .subtitle{color:#888;font-size:.8em}
.tabs{display:flex;border-bottom:1px solid #333}
.tab{flex:1;padding:12px;text-align:center;font-size:.9em;font-weight:600;cursor:pointer;color:#888;min-height:44px;border:none;background:none}
.tab.active{color:#5cb85c;border-bottom:2px solid #5cb85c}
#main{flex:1;overflow-y:auto;padding:16px}
button{min-height:44px;min-width:44px;padding:10px 20px;border:none;border-radius:6px;font-size:.95em;cursor:pointer;font-weight:600}
.btn-green{background:#5cb85c;color:#fff}
.btn-blue{background:#337ab7;color:#fff}
.btn-red{background:#d9534f;color:#fff}
.btn-amber{background:#f0ad4e;color:#111}
.btn-dark{background:#333;color:#ccc}
button:disabled{opacity:.4;cursor:not-allowed}
input[type="file"]{display:none}
input[type="text"],input[type="number"]{width:100%;padding:10px;font-size:.95em;background:#222;border:1px solid #333;border-radius:6px;color:#eee;min-height:44px;margin-bottom:8px}
input[type="range"]{width:100%}
.card{background:#1a1a1a;border-radius:8px;padding:16px;margin-bottom:12px}
.card h3{font-size:.95em;color:#5cb85c;margin-bottom:8px}
label{display:block;color:#aaa;font-size:.8em;margin-bottom:4px;margin-top:8px}

/* Record tab */
.record-area{display:flex;flex-direction:column;align-items:center;padding:24px 0}
.record-btn{width:80px;height:80px;border-radius:50%;background:#d9534f;border:4px solid #eee;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.record-btn.recording{background:#ff2222;animation:pulse 1s infinite}
.record-btn .inner{width:28px;height:28px;border-radius:50%;background:#eee;transition:all .2s}
.record-btn.recording .inner{border-radius:4px;width:24px;height:24px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(213,83,79,.6)}50%{box-shadow:0 0 0 16px rgba(213,83,79,0)}}
.timer{font-size:2em;font-family:"SF Mono",Monaco,Consolas,monospace;margin:16px 0;color:#eee}
.level-meter{width:200px;height:8px;background:#333;border-radius:4px;margin:12px 0;overflow:hidden}
.level-fill{height:100%;background:#5cb85c;transition:width 50ms;width:0}
.gps-status{font-size:.8em;color:#888;margin-top:8px}

/* Edit tab */
.waveform-wrap{position:relative;margin-bottom:8px}
#waveform-canvas{width:100%;height:150px;background:#1a1a1a;border-radius:8px;cursor:crosshair;touch-action:none}
#playhead{position:absolute;top:0;bottom:0;width:2px;background:#fff;pointer-events:none;left:0;display:none;z-index:1}
.edit-toolbar{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.meta-display{font-size:.8em;color:#888;margin-top:12px}
.meta-display div{margin-bottom:4px}
.meta-display span.val{color:#aaa}
.tags-area{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{background:#333;color:#eee;padding:4px 10px;border-radius:12px;font-size:.8em;display:flex;align-items:center;gap:4px}
.tag button{min-height:24px;min-width:24px;padding:2px 6px;font-size:.7em;background:none;color:#d9534f;border:1px solid #d9534f;border-radius:50%}

/* Plugin slot */
.plugin-slot{background:#1a1a1a;border:2px dashed #333;border-radius:8px;padding:16px;margin-bottom:8px}
.plugin-slot h4{font-size:.85em;color:#f0ad4e;margin-bottom:6px}
.plugin-slot p{font-size:.75em;color:#555;line-height:1.5}

/* Library tab */
.lib-item{background:#1a1a1a;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer}
.lib-item:hover{background:#222}
.lib-item .lib-name{font-size:.95em;margin-bottom:4px}
.lib-item .lib-info{font-size:.8em;color:#888}
.empty-msg{color:#666;text-align:center;padding:40px 0}

nav{padding:12px 16px;border-top:1px solid #333}
nav a{color:#337ab7;text-decoration:none;margin-right:16px;font-size:.9em;display:inline-block;min-height:44px;line-height:44px}
</style>
</head>
<body>

<header>
<h1>Pavement Radio</h1>
<p class="subtitle">Recorder</p>
</header>

<div class="tabs">
<button class="tab active" onclick="switchTab('record')">Record</button>
<button class="tab" onclick="switchTab('edit')">Edit</button>
<button class="tab" onclick="switchTab('library')">Library</button>
</div>

<div id="main"></div>

<input type="file" id="import-file" accept="audio/*,.zip">


<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// --- Identity redirect ---
if (!localStorage.getItem('pr-identity')) window.location.href = '/identity';

// --- State ---
let activeTab = 'record';
let mediaRecorder = null;
let recordedChunks = [];
let audioCtx = null;
let analyser = null;
let audioBuffer = null;
let currentClipMeta = null;
let isRecording = false;
let recordStart = 0;
let timerInterval = null;
let gpsPosition = null;
let selectionStart = null;
let selectionEnd = null;
let isPlaying = false;
let playSource = null;
let loopFadeMode = false;
let loopFadeDur = 2.0;
let mixMode = false;
let mixStep = 0; // 0=off, 1=source, 2=place
let mixSrcBuffer = null; // the source AudioBuffer for mixing
let mixSrcFadeDur = 0.5;
let levelAnimFrame = null;
let currentClipName = '';
let playbackStartCtxTime = 0;
let playbackOffset = 0;
let playbackDuration = 0;
let playheadRAF = null;

const DB_NAME = 'pr-recorder';
const DB_VERSION = 1;
const STORE = 'clips';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => req.result.createObjectStore(STORE, { keyPath: 'id' });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function saveClip(clip) {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).put(clip);
  return new Promise((r, e) => { tx.oncomplete = r; tx.onerror = () => e(tx.error); });
}
async function getAllClips() {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readonly');
  const req = tx.objectStore(STORE).getAll();
  return new Promise((r, e) => { tx.oncomplete = () => r(req.result); tx.onerror = () => e(tx.error); });
}
async function getClip(id) {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readonly');
  const req = tx.objectStore(STORE).get(id);
  return new Promise((r, e) => { tx.oncomplete = () => r(req.result); tx.onerror = () => e(tx.error); });
}
async function deleteClipDB(id) {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).delete(id);
  return new Promise((r, e) => { tx.oncomplete = r; tx.onerror = () => e(tx.error); });
}

// --- Tab switching ---
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.className = 'tab' + (['record', 'edit', 'library'][i] === tab ? ' active' : '');
  });
  stopPlayback();
  stopRecording();
  renderTab();
}

function renderTab() {
  const main = document.getElementById('main');
  if (activeTab === 'record') renderRecord(main);
  else if (activeTab === 'edit') renderEdit(main);
  else renderLibrary(main);
}

// --- RECORD TAB ---
function renderRecord(container) {
  container.innerHTML = `
    <div class="record-area">
      <div class="level-meter"><div class="level-fill" id="level-fill"></div></div>
      <div class="timer" id="timer">0:00</div>
      <div class="record-btn${isRecording ? ' recording' : ''}" id="record-btn" onclick="toggleRecord()">
        <div class="inner"></div>
      </div>
      <div class="gps-status" id="gps-info">GPS: acquiring...</div>
      <div style="margin-top:24px;display:flex;gap:8px">
        <button class="btn-blue" onclick="importAudio()">Import Audio</button>
      </div>
    </div>
  `;
  updateGPS();
  if (isRecording) startLevelMeter();
}

function updateGPS() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        gpsPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy_m: Math.round(pos.coords.accuracy) };
        const el = document.getElementById('gps-info');
        if (el) el.textContent = `GPS: ${gpsPosition.lat.toFixed(5)}, ${gpsPosition.lng.toFixed(5)} (±${gpsPosition.accuracy_m}m)`;
      },
      () => {
        const el = document.getElementById('gps-info');
        if (el) el.textContent = 'GPS: unavailable';
      },
      { enableHighAccuracy: true }
    );
  }
}

async function toggleRecord() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);

    // pick a supported mime type — iOS doesn't support webm
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
      : MediaRecorder.isTypeSupported('audio/aac') ? 'audio/aac' : '';
    mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start(100);

    isRecording = true;
    recordStart = Date.now();
    timerInterval = setInterval(updateTimer, 100);
    startLevelMeter();
    renderRecord(document.getElementById('main'));
  } catch (e) {
    alert('Microphone access denied: ' + e.message);
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (levelAnimFrame) { cancelAnimationFrame(levelAnimFrame); levelAnimFrame = null; }
  if (mediaRecorder) {
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
}

function updateTimer() {
  const elapsed = (Date.now() - recordStart) / 1000;
  const min = Math.floor(elapsed / 60);
  const sec = Math.floor(elapsed % 60);
  const el = document.getElementById('timer');
  if (el) el.textContent = min + ':' + sec.toString().padStart(2, '0');
}

function startLevelMeter() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  function update() {
    if (!isRecording) return;
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    const pct = Math.min(100, (avg / 128) * 100);
    const fill = document.getElementById('level-fill');
    if (fill) fill.style.width = pct + '%';
    levelAnimFrame = requestAnimationFrame(update);
  }
  update();
}

async function onRecordingStop() {
  const type = mediaRecorder?.mimeType || 'audio/webm';
  const blob = new Blob(recordedChunks, { type });
  const arrayBuf = await blob.arrayBuffer();

  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  audioBuffer = await audioCtx.decodeAudioData(arrayBuf);

  // iOS routes audio to earpiece when AudioContext was used with mic input.
  // Close the recording context so playback creates a fresh one routed to speaker.
  audioCtx.close();
  audioCtx = null;

  const identity = JSON.parse(localStorage.getItem('pr-identity') || '{}');
  const duration = audioBuffer.duration;

  currentClipMeta = {
    version: 1,
    type: 'pr-audio',
    audio_hash: '',
    recorder: { pubkey: identity.pubkey || '', handle: identity.handle || '', signature: '' },
    location: gpsPosition || null,
    recorded_at: new Date().toISOString(),
    duration_s: parseFloat(duration.toFixed(2)),
    sample_rate: audioBuffer.sampleRate,
    format: 'wav',
    source: 'live',
    derived_from: null,
    edit_history: [],
    tags: []
  };

  currentClipName = 'recording-' + new Date().toISOString().slice(0,16).replace(/[T:]/g,'-');
  selectionStart = null;
  selectionEnd = null;
  switchTab('edit');
}

function importAudio() {
  const input = document.getElementById('import-file');
  input.onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    if (!audioCtx || audioCtx.state === 'closed') {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    let audioBuf, meta = null, srcName = file.name;

    if (file.name.endsWith('.zip')) {
      // extract audio + sidecar JSON from zip
      try {
        const zip = await JSZip.loadAsync(file);
        const files = Object.keys(zip.files).filter(f => !zip.files[f].dir);
        const jsonFile = files.find(f => f.endsWith('.json'));
        const audioFile = files.find(f => !f.endsWith('.json'));
        if (!audioFile) { alert('No audio file found in zip'); input.value = ''; return; }
        const audioBlob = await zip.file(audioFile).async('arraybuffer');
        audioBuf = await audioCtx.decodeAudioData(audioBlob);
        srcName = audioFile.split('/').pop();
        if (jsonFile) {
          try { meta = JSON.parse(await zip.file(jsonFile).async('text')); } catch(e) {}
        }
      } catch(err) { alert('Could not read zip: ' + err.message); input.value = ''; return; }
    } else {
      const arrayBuf = await file.arrayBuffer();
      audioBuf = await audioCtx.decodeAudioData(arrayBuf.slice(0));
    }

    audioBuffer = audioBuf;

    if (meta) {
      // restore metadata from sidecar, preserve edit history
      currentClipMeta = meta;
      currentClipMeta.edit_history = meta.edit_history || [];
    } else {
      const identity = JSON.parse(localStorage.getItem('pr-identity') || '{}');
      currentClipMeta = {
        version: 1,
        type: 'pr-audio',
        audio_hash: '',
        recorder: { pubkey: identity.pubkey || '', handle: identity.handle || '', signature: '' },
        location: gpsPosition || null,
        recorded_at: new Date().toISOString(),
        duration_s: parseFloat(audioBuffer.duration.toFixed(2)),
        sample_rate: audioBuffer.sampleRate,
        format: 'wav',
        source: 'imported',
        original_filename: srcName,
        derived_from: null,
        edit_history: [],
        tags: []
      };
    }

    currentClipName = currentClipMeta.name || srcName.replace(/\.[^.]+$/, '');
    selectionStart = null;
    selectionEnd = null;
    switchTab('edit');
    input.value = '';
  };
  input.click();
}

// --- EDIT TAB ---
function renderEdit(container) {
  if (!audioBuffer) {
    container.innerHTML = '<p class="empty-msg">Record or import audio first.</p>';
    return;
  }

  const meta = currentClipMeta || {};
  const tags = (meta.tags || []).map((t, i) =>
    `<span class="tag">${t}<button onclick="removeTag(${i})">x</button></span>`
  ).join('');

  // resolve author display name
  let authorDisplay = '—';
  if (meta.recorder && meta.recorder.pubkey) {
    const pk = meta.recorder.pubkey;
    const shortKey = pk.substring(0, 16) + '...';
    // try to find a matching identity handle
    try {
      const myId = JSON.parse(localStorage.getItem('pr-identity') || '{}');
      if (myId.handle && myId.pubkey && (myId.pubkey === pk || myId.pubkey.startsWith(pk.substring(0, 20)))) {
        authorDisplay = myId.handle + ' (' + pk.substring(0, 16) + '...)';
      } else if (meta.recorder.handle) {
        // handle stored in metadata itself
        authorDisplay = meta.recorder.handle + ' (' + pk.substring(0, 16) + '...)';
      } else {
        authorDisplay = shortKey;
      }
    } catch(e) {
      authorDisplay = shortKey;
    }
  }

  container.innerHTML = `
    <div class="waveform-wrap">
      <canvas id="waveform-canvas" width="800" height="150"></canvas>
      <div id="playhead"></div>
    </div>

    <div class="edit-toolbar" id="main-toolbar">
      <button class="btn-amber" onclick="trimSelection()">Trim</button>
      <button class="btn-blue" onclick="enterLoopFadeMode()">Loop Fade</button>
      <button class="btn-blue" onclick="enterMixMode()">Mix</button>
      <button class="btn-green" onclick="togglePlayback()" id="play-btn">Play</button>
      <button class="btn-dark" onclick="stopPlayback()">Stop</button>
    </div>

    <div id="loopfade-panel" style="display:none">
      <div class="card" style="border:1px solid #337ab744">
        <h3 style="color:#337ab7">Loop Fade Preview</h3>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:.8em;color:#888">Fade:</span>
          <input type="range" id="fade-dur" min="0.2" max="5" step="0.1" value="2" style="flex:1"
            oninput="updateLoopFadePreview(parseFloat(this.value))">
          <span id="fade-val" style="min-width:35px;color:#aaa;font-size:.85em;text-align:right">2.0s</span>
        </div>
        <div class="edit-toolbar">
          <button class="btn-green" onclick="togglePlayback()" id="play-btn-lf">Play Preview</button>
          <button class="btn-dark" onclick="stopPlayback()">Stop</button>
        </div>
        <div class="edit-toolbar" style="margin-top:6px">
          <button class="btn-blue" onclick="commitLoopFade()">Commit</button>
          <button class="btn-dark" onclick="exitLoopFadeMode()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- MIX STEP 1: select source -->
    <div id="mix-step1" style="display:none">
      <div class="card" style="border:1px solid #5c4b8a44">
        <h3 style="color:#5c4b8a">Mix — Step 1: Source Audio</h3>
        <p style="font-size:.8em;color:#888;margin-bottom:10px">Select a region from the current audio, or import a file. This will be the layer mixed on top.</p>

        <div class="edit-toolbar" style="margin-bottom:10px">
          <button class="btn-blue" onclick="mixUseSelection()">Use Selection</button>
          <button class="btn-amber" onclick="mixImportFile()">Import File</button>
        </div>

        <div id="mix-src-info" style="font-size:.8em;color:#aaa;margin-bottom:10px"></div>

        <canvas id="mix-src-canvas" width="800" height="100" style="width:100%;height:80px;background:#151515;border-radius:6px;display:none"></canvas>

        <div id="mix-src-loopfade" style="display:none;margin-top:10px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span style="font-size:.8em;color:#888">Loop fade:</span>
            <input type="range" id="mix-src-fade" min="0" max="3" step="0.1" value="0.5" style="flex:1"
              oninput="updateMixSrcFade(parseFloat(this.value))">
            <span id="mix-src-fade-val" style="min-width:35px;color:#aaa;font-size:.85em;text-align:right">0.5s</span>
          </div>
          <div class="edit-toolbar">
            <button class="btn-green" onclick="mixPreviewSource()">Play Loop</button>
            <button class="btn-dark" onclick="stopPlayback()">Stop</button>
          </div>
        </div>

        <div class="edit-toolbar" style="margin-top:10px">
          <button class="btn-green" id="mix-step1-next" onclick="mixGoStep2()" disabled>Next</button>
          <button class="btn-dark" onclick="exitMixMode()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- MIX STEP 2: place on target -->
    <div id="mix-step2" style="display:none">
      <div class="card" style="border:1px solid #5c4b8a44">
        <h3 style="color:#5c4b8a">Mix — Step 2: Place on Target</h3>
        <p style="font-size:.8em;color:#888;margin-bottom:10px">Select the region on the waveform where the source will be mixed in. Adjust fade and volume.</p>

        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">
          <div style="flex:1;min-width:120px">
            <label style="font-size:.75em;color:#888">Fade In</label>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="range" id="mix-fade-in" min="0" max="3" step="0.1" value="0.5" style="flex:1"
                oninput="document.getElementById('mix-fi-val').textContent=this.value+'s';drawWaveform()">
              <span id="mix-fi-val" style="font-size:.8em;color:#aaa;min-width:30px;text-align:right">0.5s</span>
            </div>
          </div>
          <div style="flex:1;min-width:120px">
            <label style="font-size:.75em;color:#888">Fade Out</label>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="range" id="mix-fade-out" min="0" max="3" step="0.1" value="0.5" style="flex:1"
                oninput="document.getElementById('mix-fo-val').textContent=this.value+'s';drawWaveform()">
              <span id="mix-fo-val" style="font-size:.8em;color:#aaa;min-width:30px;text-align:right">0.5s</span>
            </div>
          </div>
          <div style="flex:1;min-width:120px">
            <label style="font-size:.75em;color:#888">Mix Volume</label>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="range" id="mix-volume" min="0" max="1.5" step="0.05" value="1" style="flex:1"
                oninput="document.getElementById('mix-vol-val').textContent=Math.round(this.value*100)+'%'">
              <span id="mix-vol-val" style="font-size:.8em;color:#aaa;min-width:35px;text-align:right">100%</span>
            </div>
          </div>
        </div>

        <div class="edit-toolbar">
          <button class="btn-green" onclick="mixPreviewResult()">Play Preview</button>
          <button class="btn-dark" onclick="stopPlayback()">Stop</button>
        </div>
        <div class="edit-toolbar" style="margin-top:6px">
          <button class="btn-green" onclick="commitMix()">Commit</button>
          <button class="btn-dark" onclick="mixBackToStep1()">Back</button>
          <button class="btn-dark" onclick="exitMixMode()">Cancel</button>
        </div>
      </div>
    </div>

    <input type="file" id="mix-import-file" accept="audio/*,.zip" style="display:none">

    <div class="card">
      <h3>Metadata</h3>
      <div style="margin-bottom:8px">
        <label style="font-size:.75em;color:#888">Name</label>
        <input type="text" id="clip-name" value="${currentClipName.replace(/"/g,'&quot;')}" placeholder="recording name" oninput="currentClipName=this.value" style="width:100%;background:#222;border:1px solid #333;border-radius:6px;color:#eee;padding:8px;font-size:.9em">
      </div>
      <div class="meta-display">
        <div>Author: <span class="val">${authorDisplay}</span></div>
        <div>Source: <span class="val">${meta.source || '—'}</span></div>
        <div>Location: <span class="val">${meta.location ? meta.location.lat.toFixed(5) + ', ' + meta.location.lng.toFixed(5) : '—'}</span></div>
        <div>Date: <span class="val">${meta.recorded_at ? new Date(meta.recorded_at).toLocaleString() : '—'}</span></div>
        <div>Duration: <span class="val">${audioBuffer.duration.toFixed(2)}s</span></div>
        <div>Sample Rate: <span class="val">${audioBuffer.sampleRate} Hz</span></div>
        ${meta.edit_history && meta.edit_history.length ? '<div>Edits: <span class="val">' + meta.edit_history.join(', ') + '</span></div>' : ''}
      </div>
    </div>

    <div class="card">
      <h3>Tags</h3>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <input type="text" id="tag-input" placeholder="Add tag..." style="flex:1">
        <button class="btn-blue" onclick="addTag()">Add</button>
      </div>
      <div class="tags-area">${tags}</div>
    </div>

    <div class="card">
      <h3>Plugins</h3>
      <div class="plugin-slot">
        <h4>Plugin Slot</h4>
        <p>Custom audio processing plugins go here. Each plugin is a self-contained HTML/JS block
        that receives the current AudioBuffer (or selected region), renders its own UI inside this
        container, and writes the processed result back. The plugin interface is a single function:
        <code>process(audioBuffer, selection) &rarr; audioBuffer</code>.
        Candidates: EQ, compressor, de-esser, noise gate, reverb, pitch shift.
        Use Web Audio API OfflineAudioContext for offline rendering.</p>
      </div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
      <button class="btn-green" onclick="saveToLibrary()">Save to Library</button>
      <button class="btn-blue" onclick="exportClip()">Export .zip</button>
    </div>
  `;

  drawWaveform();
  setupCanvasEvents();
}

// --- Waveform ---
function drawWaveform() {
  const canvas = document.getElementById('waveform-canvas');
  if (!canvas || !audioBuffer) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = 300;
  canvas.style.height = '150px';

  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, w, h);

  const data = audioBuffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  const mid = h / 2;

  // Draw selection
  if (selectionStart !== null && selectionEnd !== null) {
    const x1 = Math.min(selectionStart, selectionEnd) * w;
    const x2 = Math.max(selectionStart, selectionEnd) * w;
    ctx.fillStyle = 'rgba(92, 184, 92, 0.15)';
    ctx.fillRect(x1, 0, x2 - x1, h);
  }

  // Draw waveform
  ctx.strokeStyle = '#5cb85c';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < w; i++) {
    const idx = Math.floor(i * data.length / w);
    let min = 1, max = -1;
    for (let j = 0; j < step && idx + j < data.length; j++) {
      const val = data[idx + j];
      if (val < min) min = val;
      if (val > max) max = val;
    }
    ctx.moveTo(i, mid + min * mid);
    ctx.lineTo(i, mid + max * mid);
  }
  ctx.stroke();

  // Draw selection handles
  if (selectionStart !== null && selectionEnd !== null && !loopFadeMode) {
    ctx.strokeStyle = '#5cb85c';
    ctx.lineWidth = 2;
    const x1 = Math.min(selectionStart, selectionEnd) * w;
    const x2 = Math.max(selectionStart, selectionEnd) * w;
    ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x2, 0); ctx.lineTo(x2, h); ctx.stroke();
  }

  // Draw loop fade zones
  if (loopFadeMode && audioBuffer) {
    const fadeRatio = (loopFadeDur * audioBuffer.sampleRate) / audioBuffer.length;
    const fadeW = fadeRatio * w;

    // head zone (fade in)
    ctx.fillStyle = 'rgba(51, 122, 183, 0.25)';
    ctx.fillRect(0, 0, fadeW, h);

    // tail zone (fade out)
    ctx.fillRect(w - fadeW, 0, fadeW, h);

    // crossfade curve overlay — head
    ctx.strokeStyle = '#337ab7';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x < fadeW; x++) {
      const t = x / fadeW;
      const curve = 0.5 * (1 - Math.cos(Math.PI * t));
      ctx.lineTo(x, h - curve * h * 0.3 - h * 0.05);
    }
    ctx.stroke();

    // crossfade curve overlay — tail
    ctx.beginPath();
    for (let x = 0; x < fadeW; x++) {
      const t = x / fadeW;
      const curve = 0.5 * (1 - Math.cos(Math.PI * t));
      ctx.lineTo(w - fadeW + x, h * 0.05 + curve * h * 0.3);
    }
    ctx.stroke();

    // boundary lines
    ctx.strokeStyle = '#337ab7';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(fadeW, 0); ctx.lineTo(fadeW, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w - fadeW, 0); ctx.lineTo(w - fadeW, h); ctx.stroke();
    ctx.setLineDash([]);

    // preview waveform overlay in fade zones
    const preview = buildLoopFadePreviewBuffer();
    if (preview) {
      const pData = preview.getChannelData(0);
      ctx.strokeStyle = '#5bc0de';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      // head zone
      for (let x = 0; x < fadeW; x++) {
        const idx = Math.floor(x * pData.length / w);
        let min = 1, max = -1;
        for (let j = 0; j < step && idx + j < pData.length; j++) {
          const val = pData[idx + j];
          if (val < min) min = val;
          if (val > max) max = val;
        }
        ctx.moveTo(x, mid + min * mid);
        ctx.lineTo(x, mid + max * mid);
      }
      // tail zone
      for (let x = Math.floor(w - fadeW); x < w; x++) {
        const idx = Math.floor(x * pData.length / w);
        let min = 1, max = -1;
        for (let j = 0; j < step && idx + j < pData.length; j++) {
          const val = pData[idx + j];
          if (val < min) min = val;
          if (val > max) max = val;
        }
        ctx.moveTo(x, mid + min * mid);
        ctx.lineTo(x, mid + max * mid);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Draw mix target zone in step 2
  if (mixMode && mixStep === 2 && selectionStart !== null && selectionEnd !== null) {
    const x1 = Math.min(selectionStart, selectionEnd) * w;
    const x2 = Math.max(selectionStart, selectionEnd) * w;

    // purple overlay for mix region
    ctx.fillStyle = 'rgba(92, 75, 138, 0.2)';
    ctx.fillRect(x1, 0, x2 - x1, h);

    // fade in/out zones
    const fadeIn = parseFloat(document.getElementById('mix-fade-in')?.value || 0.5);
    const fadeOut = parseFloat(document.getElementById('mix-fade-out')?.value || 0.5);
    const regionDur = (Math.max(selectionStart, selectionEnd) - Math.min(selectionStart, selectionEnd)) * audioBuffer.duration;
    const fiW = (fadeIn / audioBuffer.duration) * w;
    const foW = (fadeOut / audioBuffer.duration) * w;

    // fade in gradient
    ctx.fillStyle = 'rgba(92, 75, 138, 0.3)';
    ctx.fillRect(x1, 0, fiW, h);
    // fade out gradient
    ctx.fillRect(x2 - foW, 0, foW, h);

    // fade curves
    ctx.strokeStyle = '#5c4b8a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x < fiW; x++) {
      const t = x / fiW;
      const curve = 0.5 * (1 - Math.cos(Math.PI * t));
      ctx.lineTo(x1 + x, h - h * 0.15 - curve * h * 0.2);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let x = 0; x < foW; x++) {
      const t = x / foW;
      const curve = 0.5 * (1 - Math.cos(Math.PI * t));
      ctx.lineTo(x2 - foW + x, h - h * 0.15 - (1 - curve) * h * 0.2);
    }
    ctx.stroke();

    // boundaries
    ctx.strokeStyle = '#5c4b8a';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x2, 0); ctx.lineTo(x2, h); ctx.stroke();
  }
}

function setupCanvasEvents() {
  const canvas = document.getElementById('waveform-canvas');
  if (!canvas) return;
  let dragging = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return (clientX - rect.left) / rect.width;
  }

  canvas.addEventListener('pointerdown', e => {
    dragging = true;
    selectionStart = getPos(e);
    selectionEnd = selectionStart;
    drawWaveform();
  });
  canvas.addEventListener('pointermove', e => {
    if (!dragging) return;
    selectionEnd = getPos(e);
    drawWaveform();
  });
  canvas.addEventListener('pointerup', () => { dragging = false; });
  canvas.addEventListener('pointerleave', () => { dragging = false; });
}

// --- Edit operations ---
function trimSelection() {
  if (!audioBuffer || selectionStart === null || selectionEnd === null) {
    alert('Select a region on the waveform first.'); return;
  }
  const start = Math.min(selectionStart, selectionEnd);
  const end = Math.max(selectionStart, selectionEnd);
  const startSample = Math.floor(start * audioBuffer.length);
  const endSample = Math.floor(end * audioBuffer.length);
  const len = endSample - startSample;
  if (len < 100) { alert('Selection too small.'); return; }

  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  const newBuf = audioCtx.createBuffer(audioBuffer.numberOfChannels, len, audioBuffer.sampleRate);
  for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
    const src = audioBuffer.getChannelData(ch);
    const dst = newBuf.getChannelData(ch);
    for (let i = 0; i < len; i++) dst[i] = src[startSample + i];
  }
  audioBuffer = newBuf;
  if (currentClipMeta) {
    currentClipMeta.duration_s = parseFloat(audioBuffer.duration.toFixed(2));
    currentClipMeta.edit_history.push(`trim ${(start * currentClipMeta.duration_s).toFixed(1)}-${(end * currentClipMeta.duration_s).toFixed(1)}s`);
  }
  selectionStart = null;
  selectionEnd = null;
  renderEdit(document.getElementById('main'));
}

function enterLoopFadeMode() {
  if (!audioBuffer) return;
  loopFadeMode = true;
  loopFadeDur = 2.0;
  stopPlayback();
  document.getElementById('main-toolbar').style.display = 'none';
  document.getElementById('loopfade-panel').style.display = 'block';
  document.getElementById('fade-dur').value = loopFadeDur;
  document.getElementById('fade-val').textContent = loopFadeDur.toFixed(1) + 's';
  drawWaveform();
}

function exitLoopFadeMode() {
  loopFadeMode = false;
  stopPlayback();
  document.getElementById('main-toolbar').style.display = '';
  document.getElementById('loopfade-panel').style.display = 'none';
  drawWaveform();
}

function updateLoopFadePreview(dur) {
  loopFadeDur = dur;
  document.getElementById('fade-val').textContent = dur.toFixed(1) + 's';
  drawWaveform();
}

function buildLoopFadePreviewBuffer() {
  // create a copy with loop fade applied for non-destructive preview
  if (!audioBuffer) return null;
  const fadeSamples = Math.floor(loopFadeDur * audioBuffer.sampleRate);
  if (fadeSamples * 2 >= audioBuffer.length) return null;

  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  const preview = audioCtx.createBuffer(audioBuffer.numberOfChannels, audioBuffer.length, audioBuffer.sampleRate);
  for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
    const src = audioBuffer.getChannelData(ch);
    const dst = preview.getChannelData(ch);
    dst.set(src);
    for (let i = 0; i < fadeSamples; i++) {
      const t = i / fadeSamples;
      const fadeIn = 0.5 * (1 - Math.cos(Math.PI * t));
      const fadeOut = 1 - fadeIn;
      const endIdx = dst.length - fadeSamples + i;
      const blended = dst[i] * fadeIn + dst[endIdx] * fadeOut;
      dst[i] = blended;
      dst[endIdx] = blended;
    }
  }
  return preview;
}

function commitLoopFade() {
  if (!audioBuffer) return;
  const fadeSamples = Math.floor(loopFadeDur * audioBuffer.sampleRate);
  if (fadeSamples * 2 >= audioBuffer.length) { alert('Audio too short for this fade duration.'); return; }

  for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
    const data = audioBuffer.getChannelData(ch);
    for (let i = 0; i < fadeSamples; i++) {
      const t = i / fadeSamples;
      const fadeIn = 0.5 * (1 - Math.cos(Math.PI * t));
      const fadeOut = 1 - fadeIn;
      const endIdx = data.length - fadeSamples + i;
      const blended = data[i] * fadeIn + data[endIdx] * fadeOut;
      data[i] = blended;
      data[endIdx] = blended;
    }
  }

  if (currentClipMeta) {
    currentClipMeta.edit_history.push(`loop_fade ${loopFadeDur}s`);
  }
  loopFadeMode = false;
  document.getElementById('main-toolbar').style.display = '';
  document.getElementById('loopfade-panel').style.display = 'none';
  renderEdit(document.getElementById('main'));
}

// --- Mix mode ---
function enterMixMode() {
  if (!audioBuffer) return;
  stopPlayback();
  mixMode = true;
  mixStep = 1;
  mixSrcBuffer = null;
  mixSrcFadeDur = 0.5;
  document.getElementById('main-toolbar').style.display = 'none';
  document.getElementById('mix-step1').style.display = 'block';
  document.getElementById('mix-step2').style.display = 'none';
  document.getElementById('mix-src-info').textContent = 'No source selected yet.';
  document.getElementById('mix-src-canvas').style.display = 'none';
  document.getElementById('mix-src-loopfade').style.display = 'none';
  document.getElementById('mix-step1-next').disabled = true;
  drawWaveform();
}

function exitMixMode() {
  stopPlayback();
  mixMode = false;
  mixStep = 0;
  mixSrcBuffer = null;
  document.getElementById('main-toolbar').style.display = '';
  document.getElementById('mix-step1').style.display = 'none';
  document.getElementById('mix-step2').style.display = 'none';
  drawWaveform();
}

function mixUseSelection() {
  if (selectionStart === null || selectionEnd === null) { alert('Select a region on the waveform first.'); return; }
  const s = Math.min(selectionStart, selectionEnd);
  const e = Math.max(selectionStart, selectionEnd);
  const startSample = Math.floor(s * audioBuffer.length);
  const endSample = Math.floor(e * audioBuffer.length);
  const len = endSample - startSample;
  if (len < 100) { alert('Selection too small.'); return; }

  ensureCtx();
  mixSrcBuffer = audioCtx.createBuffer(audioBuffer.numberOfChannels, len, audioBuffer.sampleRate);
  for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
    const src = audioBuffer.getChannelData(ch);
    const dst = mixSrcBuffer.getChannelData(ch);
    for (let i = 0; i < len; i++) dst[i] = src[startSample + i];
  }
  mixSrcReady();
}

function mixImportFile() {
  const input = document.getElementById('mix-import-file');
  input.onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    ensureCtx();
    try {
      let arrayBuf;
      if (file.name.endsWith('.zip')) {
        const zip = await JSZip.loadAsync(file);
        const files = Object.keys(zip.files).filter(f => !zip.files[f].dir);
        const audioFile = files.find(f => !f.endsWith('.json'));
        if (!audioFile) { alert('No audio in zip'); return; }
        arrayBuf = await zip.file(audioFile).async('arraybuffer');
      } else {
        arrayBuf = await file.arrayBuffer();
      }
      mixSrcBuffer = await audioCtx.decodeAudioData(arrayBuf.slice(0));
      mixSrcReady();
    } catch(err) { alert('Could not decode: ' + err.message); }
    input.value = '';
  };
  input.click();
}

function mixSrcReady() {
  document.getElementById('mix-src-info').textContent =
    mixSrcBuffer.duration.toFixed(2) + 's, ' + mixSrcBuffer.sampleRate + ' Hz, ' + mixSrcBuffer.numberOfChannels + 'ch';
  document.getElementById('mix-src-canvas').style.display = 'block';
  document.getElementById('mix-src-loopfade').style.display = 'block';
  document.getElementById('mix-step1-next').disabled = false;
  drawMixSrcWaveform();
}

function drawMixSrcWaveform() {
  const canvas = document.getElementById('mix-src-canvas');
  if (!canvas || !mixSrcBuffer) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = 160;
  canvas.style.height = '80px';

  ctx.fillStyle = '#151515';
  ctx.fillRect(0, 0, w, h);

  const data = mixSrcBuffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  const mid = h / 2;

  ctx.strokeStyle = '#5c4b8a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < w; x++) {
    const idx = Math.floor(x * data.length / w);
    let min = 1, max = -1;
    for (let j = 0; j < step && idx + j < data.length; j++) {
      const val = data[idx + j];
      if (val < min) min = val;
      if (val > max) max = val;
    }
    ctx.moveTo(x, mid + min * mid);
    ctx.lineTo(x, mid + max * mid);
  }
  ctx.stroke();

  // draw loop fade zones
  if (mixSrcFadeDur > 0) {
    const fadeRatio = (mixSrcFadeDur * mixSrcBuffer.sampleRate) / mixSrcBuffer.length;
    const fadeW = fadeRatio * w;
    ctx.fillStyle = 'rgba(92, 75, 138, 0.25)';
    ctx.fillRect(0, 0, fadeW, h);
    ctx.fillRect(w - fadeW, 0, fadeW, h);
    ctx.strokeStyle = '#5c4b8a';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(fadeW, 0); ctx.lineTo(fadeW, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w - fadeW, 0); ctx.lineTo(w - fadeW, h); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function updateMixSrcFade(val) {
  mixSrcFadeDur = val;
  document.getElementById('mix-src-fade-val').textContent = val.toFixed(1) + 's';
  drawMixSrcWaveform();
}

function buildMixSrcLooped() {
  // apply loop fade to the source buffer (non-destructive copy)
  if (!mixSrcBuffer) return null;
  ensureCtx();
  const buf = audioCtx.createBuffer(mixSrcBuffer.numberOfChannels, mixSrcBuffer.length, mixSrcBuffer.sampleRate);
  for (let ch = 0; ch < mixSrcBuffer.numberOfChannels; ch++) {
    buf.getChannelData(ch).set(mixSrcBuffer.getChannelData(ch));
  }
  if (mixSrcFadeDur > 0) {
    const fadeSamples = Math.floor(mixSrcFadeDur * buf.sampleRate);
    if (fadeSamples * 2 < buf.length) {
      for (let ch = 0; ch < buf.numberOfChannels; ch++) {
        const data = buf.getChannelData(ch);
        for (let i = 0; i < fadeSamples; i++) {
          const t = i / fadeSamples;
          const fadeIn = 0.5 * (1 - Math.cos(Math.PI * t));
          const fadeOut = 1 - fadeIn;
          const endIdx = data.length - fadeSamples + i;
          const blended = data[i] * fadeIn + data[endIdx] * fadeOut;
          data[i] = blended;
          data[endIdx] = blended;
        }
      }
    }
  }
  return buf;
}

function mixPreviewSource() {
  stopPlayback();
  const buf = buildMixSrcLooped();
  if (!buf) return;
  ensureCtx();
  audioCtx.resume().then(() => {
    playSource = audioCtx.createBufferSource();
    playSource.buffer = buf;
    playSource.loop = true;
    playSource.connect(audioCtx.destination);
    playSource.start();
    isPlaying = true;
    playbackStartCtxTime = audioCtx.currentTime;
    playbackOffset = 0;
    playbackDuration = buf.duration;
    const ph = document.getElementById('playhead');
    if (ph) ph.style.display = 'block';
    animatePlayhead();
    playSource.onended = () => { isPlaying = false; stopPlayhead(); };
  });
}

function mixGoStep2() {
  if (!mixSrcBuffer) return;
  stopPlayback();
  mixStep = 2;
  // clear selection so user can select the target region
  selectionStart = null;
  selectionEnd = null;
  document.getElementById('mix-step1').style.display = 'none';
  document.getElementById('mix-step2').style.display = 'block';
  drawWaveform();
}

function mixBackToStep1() {
  stopPlayback();
  mixStep = 1;
  document.getElementById('mix-step1').style.display = 'block';
  document.getElementById('mix-step2').style.display = 'none';
  drawWaveform();
}

function buildMixPreviewBuffer() {
  if (!audioBuffer || !mixSrcBuffer || selectionStart === null || selectionEnd === null) return null;
  ensureCtx();

  const s = Math.min(selectionStart, selectionEnd);
  const e = Math.max(selectionStart, selectionEnd);
  const startSample = Math.floor(s * audioBuffer.length);
  const endSample = Math.floor(e * audioBuffer.length);
  const regionLen = endSample - startSample;
  if (regionLen < 10) return null;

  const fadeIn = parseFloat(document.getElementById('mix-fade-in')?.value || 0.5);
  const fadeOut = parseFloat(document.getElementById('mix-fade-out')?.value || 0.5);
  const volume = parseFloat(document.getElementById('mix-volume')?.value || 1);

  const loopedSrc = buildMixSrcLooped();
  if (!loopedSrc) return null;

  // create copy of main buffer
  const result = audioCtx.createBuffer(audioBuffer.numberOfChannels, audioBuffer.length, audioBuffer.sampleRate);
  for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
    result.getChannelData(ch).set(audioBuffer.getChannelData(ch));
  }

  // mix source into the selected region, looping the source
  const fadeInSamples = Math.floor(fadeIn * audioBuffer.sampleRate);
  const fadeOutSamples = Math.floor(fadeOut * audioBuffer.sampleRate);
  const srcData = loopedSrc.getChannelData(0);

  for (let ch = 0; ch < result.numberOfChannels; ch++) {
    const dst = result.getChannelData(ch);
    const src = loopedSrc.numberOfChannels > ch ? loopedSrc.getChannelData(ch) : srcData;

    for (let i = 0; i < regionLen; i++) {
      const dstIdx = startSample + i;
      const srcIdx = i % src.length; // loop the source

      let env = volume;
      // fade in
      if (i < fadeInSamples) {
        env *= 0.5 * (1 - Math.cos(Math.PI * i / fadeInSamples));
      }
      // fade out
      if (i > regionLen - fadeOutSamples) {
        const remaining = regionLen - i;
        env *= 0.5 * (1 - Math.cos(Math.PI * remaining / fadeOutSamples));
      }

      dst[dstIdx] = dst[dstIdx] + src[srcIdx] * env;
      // clip
      if (dst[dstIdx] > 1) dst[dstIdx] = 1;
      if (dst[dstIdx] < -1) dst[dstIdx] = -1;
    }
  }

  return result;
}

function mixPreviewResult() {
  stopPlayback();
  const buf = buildMixPreviewBuffer();
  if (!buf) { alert('Select a region on the waveform first.'); return; }
  ensureCtx();
  const s = Math.min(selectionStart, selectionEnd);
  const offset = Math.max(0, s * buf.duration - 1);
  audioCtx.resume().then(() => {
    playSource = audioCtx.createBufferSource();
    playSource.buffer = buf;
    playSource.connect(audioCtx.destination);
    playSource.start(0, offset);
    isPlaying = true;
    playbackStartCtxTime = audioCtx.currentTime;
    playbackOffset = offset;
    playbackDuration = buf.duration;
    const ph = document.getElementById('playhead');
    if (ph) ph.style.display = 'block';
    animatePlayhead();
    playSource.onended = () => { isPlaying = false; stopPlayhead(); };
  });
}

function commitMix() {
  if (selectionStart === null || selectionEnd === null) { alert('Select a target region.'); return; }
  const result = buildMixPreviewBuffer();
  if (!result) { alert('Could not build mix.'); return; }

  // write result back to audioBuffer
  for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
    audioBuffer.getChannelData(ch).set(result.getChannelData(ch));
  }

  const fadeIn = document.getElementById('mix-fade-in')?.value || '0.5';
  const fadeOut = document.getElementById('mix-fade-out')?.value || '0.5';
  if (currentClipMeta) {
    currentClipMeta.edit_history.push(`mix fi:${fadeIn}s fo:${fadeOut}s`);
  }

  exitMixMode();
  renderEdit(document.getElementById('main'));
}

function ensureCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // resume is best-effort here; for playback use togglePlayback which handles it properly
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// --- Playback ---
function togglePlayback() {
  if (isPlaying) { stopPlayback(); return; }
  // Create/resume AudioContext synchronously in the user gesture
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  audioCtx.resume().then(() => startPlayback());
}

function startPlayback() {
  if (!audioBuffer || !audioCtx) return;

  // in loop fade mode, play the preview buffer with looping
  const buf = loopFadeMode ? (buildLoopFadePreviewBuffer() || audioBuffer) : audioBuffer;

  playSource = audioCtx.createBufferSource();
  playSource.buffer = buf;
  if (loopFadeMode) playSource.loop = true;
  playSource.connect(audioCtx.destination);

  let offset = 0, dur = undefined;
  if (!loopFadeMode && selectionStart !== null && selectionEnd !== null) {
    const s = Math.min(selectionStart, selectionEnd);
    const e = Math.max(selectionStart, selectionEnd);
    offset = s * audioBuffer.duration;
    dur = (e - s) * audioBuffer.duration;
  }

  if (dur !== undefined) playSource.start(0, offset, dur);
  else playSource.start(0, offset);
  isPlaying = true;

  // playhead animation
  playbackStartCtxTime = audioCtx.currentTime;
  playbackOffset = offset;
  playbackDuration = buf.duration;
  const ph = document.getElementById('playhead');
  if (ph) ph.style.display = 'block';
  animatePlayhead();

  playSource.onended = () => {
    isPlaying = false;
    stopPlayhead();
    const btn = document.getElementById('play-btn') || document.getElementById('play-btn-lf');
    if (btn) btn.textContent = loopFadeMode ? 'Play Preview' : 'Play';
  };
  const btn = document.getElementById(loopFadeMode ? 'play-btn-lf' : 'play-btn');
  if (btn) btn.textContent = 'Stop';
}

function animatePlayhead() {
  if (!isPlaying || !audioCtx) return;
  const elapsed = audioCtx.currentTime - playbackStartCtxTime + playbackOffset;
  const pos = loopFadeMode ? (elapsed % playbackDuration) / playbackDuration : elapsed / playbackDuration;
  const ph = document.getElementById('playhead');
  if (ph) ph.style.left = (Math.min(1, pos) * 100) + '%';
  playheadRAF = requestAnimationFrame(animatePlayhead);
}

function stopPlayhead() {
  if (playheadRAF) { cancelAnimationFrame(playheadRAF); playheadRAF = null; }
  const ph = document.getElementById('playhead');
  if (ph) { ph.style.left = '0'; ph.style.display = 'none'; }
}

function stopPlayback() {
  if (playSource) { try { playSource.stop(); } catch(e) {} playSource = null; }
  isPlaying = false;
  stopPlayhead();
  const btn = document.getElementById('play-btn');
  if (btn) btn.textContent = 'Play';
  const btnLf = document.getElementById('play-btn-lf');
  if (btnLf) btnLf.textContent = 'Play Preview';
}

// --- Tags ---
function addTag() {
  const input = document.getElementById('tag-input');
  const val = input.value.trim().toLowerCase();
  if (!val || !currentClipMeta) return;
  if (!currentClipMeta.tags.includes(val)) {
    currentClipMeta.tags.push(val);
    renderEdit(document.getElementById('main'));
  }
}

function removeTag(index) {
  if (!currentClipMeta) return;
  currentClipMeta.tags.splice(index, 1);
  renderEdit(document.getElementById('main'));
}

// --- WAV encoder ---
function bufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const length = buffer.length;
  const bytesPerSample = 2;
  const blockAlign = numChannels * bytesPerSample;
  const dataSize = length * blockAlign;
  const bufferSize = 44 + dataSize;
  const out = new ArrayBuffer(bufferSize);
  const view = new DataView(out);

  function writeStr(offset, str) { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); }

  writeStr(0, 'RIFF');
  view.setUint32(4, bufferSize - 8, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bytesPerSample * 8, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < length; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let sample = buffer.getChannelData(ch)[i];
      sample = Math.max(-1, Math.min(1, sample));
      view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
      offset += 2;
    }
  }

  return new Blob([out], { type: 'audio/wav' });
}

// --- Save / Export ---
async function saveToLibrary() {
  if (!audioBuffer || !currentClipMeta) return;
  const name = currentClipName.trim() || 'recording-' + Date.now().toString(36);

  currentClipMeta.name = name;
  const wavBlob = bufferToWav(audioBuffer);
  const clip = {
    id: 'clip-' + Date.now().toString(36),
    name: name,
    wavBlob: wavBlob,
    meta: { ...currentClipMeta },
    savedAt: new Date().toISOString()
  };
  await saveClip(clip);
  alert('Saved "' + name + '" to library.');
}

async function exportClip() {
  if (!audioBuffer || !currentClipMeta) return;
  const name = (currentClipName.trim() || 'recording').replace(/[^a-zA-Z0-9_-]/g, '_');
  currentClipMeta.name = currentClipName.trim() || name;

  const wavBlob = bufferToWav(audioBuffer);
  const zip = new JSZip();
  zip.file(name + '.wav', wavBlob);
  zip.file(name + '.json', JSON.stringify(currentClipMeta, null, 2));

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name + '.zip';
  a.click();
  URL.revokeObjectURL(url);
}

// --- LIBRARY TAB ---
async function renderLibrary(container) {
  const clips = await getAllClips();
  if (clips.length === 0) {
    container.innerHTML = '<p class="empty-msg">No recordings yet. Record or import audio to get started.</p>';
    return;
  }

  container.innerHTML = clips.map(c => `
    <div class="lib-item" onclick="loadClip('${c.id}')">
      <div class="lib-name">${c.name}</div>
      <div class="lib-info">
        ${c.meta.duration_s ? c.meta.duration_s.toFixed(1) + 's' : ''} |
        ${c.meta.location ? c.meta.location.lat.toFixed(4) + ', ' + c.meta.location.lng.toFixed(4) : 'No location'} |
        ${new Date(c.savedAt).toLocaleDateString()}
        ${c.meta.tags && c.meta.tags.length ? ' | ' + c.meta.tags.join(', ') : ''}
      </div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn-blue" onclick="event.stopPropagation();exportFromLibrary('${c.id}')" style="font-size:.8em;padding:6px 12px">Export</button>
        <button class="btn-red" onclick="event.stopPropagation();deleteFromLibrary('${c.id}')" style="font-size:.8em;padding:6px 12px">Delete</button>
      </div>
    </div>
  `).join('');
}

async function loadClip(id) {
  const clip = await getClip(id);
  if (!clip) return;

  const arrayBuf = await clip.wavBlob.arrayBuffer();
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
  currentClipMeta = { ...clip.meta };
  currentClipName = clip.name || currentClipMeta.name || '';
  selectionStart = null;
  selectionEnd = null;
  switchTab('edit');
}

async function exportFromLibrary(id) {
  const clip = await getClip(id);
  if (!clip) return;
  const name = clip.name || 'recording';

  const zip = new JSZip();
  zip.file(name + '.wav', clip.wavBlob);
  zip.file(name + '.json', JSON.stringify(clip.meta, null, 2));

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(zipBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name + '.zip';
  a.click();
  URL.revokeObjectURL(url);
}

async function deleteFromLibrary(id) {
  if (!confirm('Delete this recording?')) return;
  await deleteClipDB(id);
  renderLibrary(document.getElementById('main'));
}

// --- Init ---
renderTab();
</script>
