<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pavement Radio — Identity</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding:16px;padding-bottom:80px}
nav.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#1a1a1a;border-top:1px solid #333;display:flex;z-index:9999;padding-bottom:env(safe-area-inset-bottom,0)}
nav.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;color:#666;font-size:10px;gap:2px;transition:color .15s}
nav.bottom-nav a.active{color:#5cb85c}
nav.bottom-nav a:active{opacity:.6}
nav.bottom-nav svg{width:22px;height:22px;fill:currentColor}
h1{font-size:1.4em;margin-bottom:4px}
.subtitle{color:#888;font-size:.85em;margin-bottom:24px}
.card{background:#1a1a1a;border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:1.1em;margin-bottom:12px;color:#5cb85c}
label{display:block;color:#aaa;font-size:.85em;margin-bottom:4px}
input[type="text"]{width:100%;padding:12px;font-size:1em;background:#222;border:1px solid #333;border-radius:6px;color:#eee;margin-bottom:12px;min-height:44px}
input[type="file"]{display:none}
button{min-height:44px;min-width:44px;padding:10px 20px;border:none;border-radius:6px;font-size:.95em;cursor:pointer;font-weight:600;margin-right:8px;margin-bottom:8px}
.btn-green{background:#5cb85c;color:#fff}
.btn-blue{background:#337ab7;color:#fff}
.btn-red{background:#d9534f;color:#fff}
.btn-amber{background:#f0ad4e;color:#111}
.btn-green:disabled,.btn-blue:disabled{opacity:.4;cursor:not-allowed}
.mono{font-family:"SF Mono",Monaco,Consolas,monospace;font-size:.8em;word-break:break-all;color:#aaa;background:#222;padding:8px;border-radius:4px;margin-top:4px}
.status{padding:10px;border-radius:6px;margin-bottom:12px;font-size:.9em;display:none}
.status.ok{display:block;background:#1a3a1a;color:#5cb85c}
.status.err{display:block;background:#3a1a1a;color:#d9534f}
.status.info{display:block;background:#1a2a3a;color:#337ab7}
.identity-display{margin-top:8px}
.identity-display .field{margin-bottom:8px}
.identity-display .field-label{color:#888;font-size:.75em;text-transform:uppercase;letter-spacing:.5px}
.identity-display .field-value{color:#eee;font-size:.95em;margin-top:2px}
nav{margin-top:24px;padding-top:16px;border-top:1px solid #333}
nav a{color:#337ab7;text-decoration:none;margin-right:16px;font-size:.95em;display:inline-block;min-height:44px;line-height:44px}
nav a:hover{text-decoration:underline}
#generate-section,#manage-section{display:none}
</style>
</head>
<body>

<h1>Pavement Radio</h1>
<p class="subtitle">Identity</p>

<div id="status" class="status"></div>

<!-- Generate new identity -->
<div id="generate-section" class="card">
<h2>Create Identity</h2>
<label for="new-handle">Handle</label>
<input type="text" id="new-handle" placeholder="e.g. ghost_narrator" autocomplete="off">
<button class="btn-green" onclick="window.generateIdentity()">Generate Keypair</button>
</div>

<!-- Existing identity management -->
<div id="manage-section">
<div class="card">
<h2>Your Identity</h2>
<div class="identity-display">
<div class="field">
<div class="field-label">Handle</div>
<div class="field-value" id="display-handle"></div>
</div>
<div class="field">
<div class="field-label">Public Key</div>
<div class="mono" id="display-pubkey"></div>
</div>
<div class="field">
<div class="field-label">Created</div>
<div class="field-value" id="display-created"></div>
</div>
</div>
</div>

<div class="card">
<h2>Change Handle</h2>
<input type="text" id="change-handle" placeholder="New handle">
<button class="btn-blue" onclick="window.changeHandle()">Update</button>
</div>

<div class="card">
<h2>Export / Import</h2>
<button class="btn-blue" onclick="window.exportIdentity()">Export .pr-identity.json</button>
<button class="btn-amber" onclick="document.getElementById('import-file').click()">Import .pr-identity.json</button>
<input type="file" id="import-file" accept=".json,.pr-identity.json" onchange="window.importIdentity(event)">
</div>

<div class="card">
<h2>Danger Zone</h2>
<button class="btn-red" onclick="window.deleteIdentity()">Delete Identity</button>
<button class="btn-red" onclick="window.nukeAllData()" style="margin-top:8px">Reset Everything</button>
<p style="font-size:.75em;color:#555;margin-top:6px">Deletes all IndexedDB databases, localStorage, and reloads. Use when old data conflicts with new code.</p>
</div>
</div>


<script>
// Immediate UI refresh — runs before module loads
function refreshUI() {
  const identity = localStorage.getItem('pr-identity');
  if (identity) {
    try {
      const data = JSON.parse(identity);
      document.getElementById('generate-section').style.display = 'none';
      document.getElementById('manage-section').style.display = 'block';
      document.getElementById('display-handle').textContent = data.handle;
      document.getElementById('display-pubkey').textContent = data.pubkey;
      document.getElementById('display-created').textContent = new Date(data.created_at).toLocaleString();
      document.getElementById('change-handle').value = data.handle;
    } catch(e) {
      document.getElementById('generate-section').style.display = 'block';
      document.getElementById('manage-section').style.display = 'none';
    }
  } else {
    document.getElementById('generate-section').style.display = 'block';
    document.getElementById('manage-section').style.display = 'none';
  }
}
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (type || '');
  setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 4000);
}
window.nukeAllData = async function() {
  if (!confirm('This will delete ALL Pavement Radio data:\n\n- Identity & keys\n- Recorder library\n- Editor projects\n- Player cache\n- All localStorage\n\nAre you sure?')) return;
  const dbs = ['pr-identity-keys', 'pr-editor-audio', 'pr-recorder', 'pr-player-audio'];
  for (const name of dbs) {
    try { await new Promise((res, rej) => { const r = indexedDB.deleteDatabase(name); r.onsuccess = res; r.onerror = rej; r.onblocked = res; }); } catch(e) {}
  }
  if (indexedDB.databases) {
    try {
      const allDbs = await indexedDB.databases();
      for (const db of allDbs) {
        if (db.name && db.name.startsWith('pr-')) {
          try { await new Promise((res, rej) => { const r = indexedDB.deleteDatabase(db.name); r.onsuccess = res; r.onerror = rej; r.onblocked = res; }); } catch(e) {}
        }
      }
    } catch(e) {}
  }
  localStorage.clear();
  alert('All data deleted. Reloading...');
  location.reload();
};

refreshUI();
</script>
<script type="module">
import * as ed from 'https://esm.sh/@noble/ed25519@2.2.3';
import { sha512 } from 'https://esm.sh/@noble/hashes@1.7.1/sha512';

// The library exports vary by version — find the right object
const ed25519 = ed.ed25519 || ed;

// Provide sha512Sync so ed25519 works synchronously (no crypto.subtle needed)
ed25519.etc.sha512Sync = (...msgs) => {
  const merged = ed25519.etc.concatBytes(...msgs);
  return sha512(merged);
};

const DB_NAME = 'pr-identity-keys';
const DB_VERSION = 1;
const STORE = 'keys';
const LS_KEY = 'pr-identity';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => { req.result.createObjectStore(STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function storeKeys(privateKey, publicKey) {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readwrite');
  const store = tx.objectStore(STORE);
  store.put(privateKey, 'private');
  store.put(publicKey, 'public');
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadKeys() {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readonly');
  const store = tx.objectStore(STORE);
  const priv = store.get('private');
  const pub = store.get('public');
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve({ privateKey: priv.result, publicKey: pub.result });
    tx.onerror = () => reject(tx.error);
  });
}

async function clearKeys() {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).clear();
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

function bytesToBase64(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function base64ToBytes(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}


window.generateIdentity = async function() {
  const handle = document.getElementById('new-handle').value.trim();
  if (!handle) { showStatus('Enter a handle first.', 'err'); return; }

  try {
    // Generate private key from random bytes
    const privateKey = crypto.getRandomValues(new Uint8Array(32));
    const publicKey = ed25519.getPublicKey(privateKey);

    // Store raw bytes in IndexedDB
    await storeKeys(privateKey, publicKey);

    // Store metadata in localStorage
    const meta = {
      handle: handle,
      pubkey: bytesToBase64(publicKey),
      created_at: new Date().toISOString()
    };
    localStorage.setItem(LS_KEY, JSON.stringify(meta));

    showStatus('Identity created.', 'ok');
    refreshUI();
  } catch (e) {
    showStatus('Failed to generate identity: ' + e.message, 'err');
  }
};

window.changeHandle = function() {
  const newHandle = document.getElementById('change-handle').value.trim();
  if (!newHandle) { showStatus('Handle cannot be empty.', 'err'); return; }

  const identity = JSON.parse(localStorage.getItem(LS_KEY));
  identity.handle = newHandle;
  localStorage.setItem(LS_KEY, JSON.stringify(identity));
  showStatus('Handle updated.', 'ok');
  refreshUI();
};

window.exportIdentity = async function() {
  try {
    const keys = await loadKeys();
    const identity = JSON.parse(localStorage.getItem(LS_KEY));
    const exportData = {
      handle: identity.handle,
      pubkey: bytesToBase64(keys.publicKey),
      privkey: bytesToBase64(keys.privateKey),
      created_at: identity.created_at
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = identity.handle + '.pr-identity.json';
    a.click();
    URL.revokeObjectURL(url);
    showStatus('Identity exported.', 'ok');
  } catch (e) {
    showStatus('Export failed: ' + e.message, 'err');
  }
};

window.importIdentity = async function(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.handle || !data.pubkey || !data.privkey) {
      showStatus('Invalid identity file: missing fields.', 'err');
      return;
    }

    const privateKey = base64ToBytes(data.privkey);
    const publicKey = base64ToBytes(data.pubkey);

    // Verify keypair by doing a test sign/verify (sync)
    const testMsg = new Uint8Array([1, 2, 3, 4]);
    const sig = ed25519.sign(testMsg, privateKey);
    const valid = ed25519.verify(sig, testMsg, publicKey);
    if (!valid) {
      showStatus('Keypair verification failed. Keys do not match.', 'err');
      return;
    }

    await storeKeys(privateKey, publicKey);
    const meta = {
      handle: data.handle,
      pubkey: data.pubkey,
      created_at: data.created_at || new Date().toISOString()
    };
    localStorage.setItem(LS_KEY, JSON.stringify(meta));
    showStatus('Identity imported and verified.', 'ok');
    refreshUI();
  } catch (e) {
    showStatus('Import failed: ' + e.message, 'err');
  }
  event.target.value = '';
};

window.deleteIdentity = async function() {
  if (!confirm('Delete your identity? This cannot be undone unless you have an export.')) return;
  if (!confirm('Are you sure? Your private key will be permanently deleted.')) return;
  try {
    await clearKeys();
    localStorage.removeItem(LS_KEY);
    showStatus('Identity deleted.', 'info');
    refreshUI();
  } catch (e) {
    showStatus('Delete failed: ' + e.message, 'err');
  }
};

refreshUI();
</script>
