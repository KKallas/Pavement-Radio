<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pavement Radio — Editor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#map{flex:1;z-index:1;margin-bottom:60px}
nav.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:#1a1a1a;border-top:1px solid #333;display:flex;z-index:9999;padding-bottom:env(safe-area-inset-bottom,0)}
nav.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;color:#666;font-size:10px;gap:2px;transition:color .15s}
nav.bottom-nav a.active{color:#5cb85c}
nav.bottom-nav a:active{opacity:.6}
nav.bottom-nav svg{width:22px;height:22px;fill:currentColor}
.toolbar{display:flex;gap:6px;padding:8px 12px;background:#1a1a1a;border-bottom:1px solid #333;z-index:1000;flex-wrap:wrap;align-items:center}
button{min-height:44px;min-width:44px;padding:8px 16px;border:none;border-radius:6px;font-size:.85em;cursor:pointer;font-weight:600}
.btn-green{background:#5cb85c;color:#fff}
.btn-blue{background:#337ab7;color:#fff}
.btn-amber{background:#f0ad4e;color:#111}
.btn-red{background:#d9534f;color:#fff}
.btn-dark{background:#333;color:#ccc}
.btn-dark.active{background:#5cb85c;color:#fff}
button:disabled{opacity:.4;cursor:not-allowed}
input[type="file"]{display:none}
.mode-label{color:#888;font-size:.75em;margin-right:4px}
.spacer{flex:1}

/* Panel */
.panel-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000}
.panel{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:#1a1a1a;border-radius:12px 12px 0 0;z-index:2001;overflow-y:auto;padding:16px;padding-bottom:80px;display:none}
.panel-header{display:flex;align-items:center;margin-bottom:12px}
.panel-header h2{flex:1;font-size:1.1em;color:#5cb85c}
.panel-close{background:none;border:none;color:#888;font-size:1.5em;cursor:pointer;min-height:44px;min-width:44px}
label{display:block;color:#aaa;font-size:.8em;margin-bottom:4px;margin-top:12px}
label:first-of-type{margin-top:0}
input[type="text"],input[type="number"]{width:100%;padding:10px;font-size:.95em;background:#222;border:1px solid #333;border-radius:6px;color:#eee;min-height:44px}
input[type="range"]{width:100%;margin:4px 0}
select{width:100%;padding:10px;font-size:.95em;background:#222;border:1px solid #333;border-radius:6px;color:#eee;min-height:44px}
.prereq-list{list-style:none;margin-top:8px}
.prereq-list li{display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:6px 10px;background:#222;border-radius:4px;font-size:.85em}
.prereq-list li button{min-height:32px;min-width:32px;padding:4px 10px;font-size:.8em}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.checkbox-row input[type="checkbox"]{width:20px;height:20px}
.audio-tabs{display:flex;gap:4px;margin-top:12px}
.audio-tab{padding:8px 16px;border:none;border-radius:6px 6px 0 0;font-size:.8em;cursor:pointer;font-weight:600}
.audio-tab.on{background:#2a4a2a;color:#5cb85c}
.audio-tab.off{background:#4a3a1a;color:#f0ad4e}
.audio-tab.active-tab{opacity:1;border-bottom:2px solid}
.audio-tab:not(.active-tab){opacity:.5}
.track-row{padding:8px;background:#222;border-radius:6px;margin-bottom:6px}
.track-header{display:flex;align-items:center;gap:8px}
.track-label{width:70px;font-size:.8em;font-weight:600;color:#888;text-transform:uppercase}
.track-file{flex:1;font-size:.8em;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-meta{font-size:.7em;color:#666;margin-top:2px}
.track-buttons{display:flex;gap:4px}
.track-buttons button{min-height:36px;min-width:36px;padding:4px 8px;font-size:.75em}
.track-wave-wrap{margin-top:6px;position:relative;cursor:pointer}
.track-wave-wrap canvas{width:100%;height:48px;display:block;border-radius:4px;background:#1a1a1a}
.track-transport{display:flex;gap:4px;margin-top:4px}
.track-transport button{min-height:32px;min-width:32px;padding:2px 8px;font-size:.75em}
.track-playhead{position:absolute;top:0;bottom:0;width:2px;background:#5cb85c;pointer-events:none;left:0}
.delete-section{margin-top:24px;padding-top:16px;border-top:1px solid #333;display:flex;gap:8px}
.btn-amber-outline{background:transparent;border:2px solid #f0ad4e;color:#f0ad4e}
.gps-btn{position:fixed;bottom:76px;right:12px;width:44px;height:44px;background:#1a1a1a;border:1px solid #333;border-radius:50%;z-index:1500;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px #0004}
.gps-btn svg{width:22px;height:22px;fill:#888;transition:fill .15s}
.gps-btn.has-fix svg{fill:#4a90d9}

/* Library picker */
.lib-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:3000}
.lib-panel{position:fixed;top:10%;left:5%;right:5%;bottom:10%;background:#1a1a1a;border-radius:12px;z-index:3001;overflow-y:auto;padding:16px;display:none}
.lib-wp-item{padding:10px;background:#222;border-radius:6px;margin-bottom:6px;cursor:pointer}
.lib-wp-item:hover{background:#2a2a2a}
.lib-track-item{padding:8px 12px;background:#2a2a2a;border-radius:4px;margin:4px 0;cursor:pointer;font-size:.85em;display:flex;align-items:center;gap:8px}
.lib-track-item:hover{background:#333}

.add-wp-popup .leaflet-popup-content-wrapper{background:#1a1a1a;border-radius:8px;box-shadow:0 4px 16px #0008}
.add-wp-popup .leaflet-popup-content{margin:8px}
.add-wp-popup .leaflet-popup-tip{background:#1a1a1a}

/* Settings panel */
.settings-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:4000}
.settings-panel{position:fixed;top:5%;left:3%;right:3%;bottom:5%;background:#1a1a1a;border-radius:12px;z-index:4001;overflow-y:auto;padding:16px;display:none;-webkit-overflow-scrolling:touch}
.settings-panel h2{font-size:1.1em;margin-bottom:12px;color:#fff}
.settings-panel label{display:block;font-size:.8em;color:#888;margin-bottom:4px;margin-top:12px}
.settings-panel input[type=text],.settings-panel textarea{width:100%;background:#222;border:1px solid #333;border-radius:6px;color:#eee;padding:10px;font-size:.9em;font-family:inherit}
.settings-panel textarea{min-height:120px;resize:vertical;font-family:'SF Mono','Menlo',monospace;font-size:.8em;line-height:1.5}
.settings-media{margin-top:12px}
.settings-media-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.settings-media-item{position:relative;width:80px;height:80px;border-radius:6px;overflow:hidden;background:#222}
.settings-media-item img,.settings-media-item video{width:100%;height:100%;object-fit:cover}
.settings-media-item .media-del{position:absolute;top:2px;right:2px;width:20px;height:20px;background:#d9534fcc;color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.settings-media-size{font-size:.75em;color:#666;margin-top:4px}
.settings-actions{display:flex;gap:8px;margin-top:16px}
</style>
</head>
<body>

<div class="toolbar">
<span id="toolbarTitle" style="color:#fff;font-weight:700;font-size:14px;margin-right:auto;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onclick="openSettings()"></span>
<button class="btn-red" onclick="newTour()">New</button>
<button class="btn-blue" onclick="openTour()">Open</button>
<button class="btn-green" onclick="saveTour()">Save</button>
<button class="btn-dark" onclick="openSettings()">&#9881;</button>
</div>

<div id="map"></div>

<button class="gps-btn" id="gps-btn" onclick="centerOnGps()" title="Center on my position">
  <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
</button>

<!-- Waypoint editor panel -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
<div class="panel-header">
<h2 id="panel-title">Waypoint</h2>
<button class="panel-close" onclick="closePanel()">&times;</button>
</div>
<div id="panel-body"></div>
</div>

<!-- Library browser -->
<div class="lib-overlay" id="lib-overlay" onclick="closeLibrary()"></div>
<div class="lib-panel" id="lib-panel">
<div class="panel-header">
<h2>Tour Browser</h2>
<button class="panel-close" onclick="closeLibrary()">&times;</button>
</div>
<div id="lib-body"></div>
</div>

<!-- Settings panel -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settings-panel">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h2>Tour Settings</h2>
    <button class="panel-close" onclick="closeSettings()">&times;</button>
  </div>

  <label>Tour Name</label>
  <input type="text" id="settings-name" placeholder="My Tour" onchange="saveTourSettings()">

  <label>Description <span style="color:#555">(Markdown)</span></label>
  <textarea id="settings-desc" placeholder="Describe the tour experience...&#10;&#10;Supports **bold**, *italic*, [links](url), etc." onchange="saveTourSettings()"></textarea>

  <div class="settings-media">
    <label>Media <span style="color:#555">(images/video, max 10MB total)</span></label>
    <div class="settings-media-grid" id="media-grid"></div>
    <div class="settings-media-size" id="media-size"></div>
    <button class="btn-blue" onclick="addMedia()" style="margin-top:8px;font-size:.8em;padding:8px 14px">Add Image/Video</button>
    <input type="file" id="media-file" accept="image/*,video/*" style="display:none" onchange="handleMediaUpload(event)">
  </div>

  <div class="settings-actions">
    <button class="btn-green" onclick="closeSettings()">Done</button>
  </div>
</div>

<input type="file" id="open-file" accept=".pr,.zip" onchange="handleOpen(event)">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// --- Identity redirect ---
if (!localStorage.getItem('pr-identity')) window.location.href = '/identity';

// --- State ---
let waypoints = [];
let selectedWp = null;
let activeAudioSet = 'on'; // 'on' or 'off'
let map, wpLayers = [], arrowLayers = [];
let playingAudio = null;
let currentLibTarget = null; // { wpIndex, set, track }
let tourTitle = localStorage.getItem('pr-ed-title') || 'My Tour';
let tourDescription = localStorage.getItem('pr-ed-desc') || '';
let tourMedia = JSON.parse(localStorage.getItem('pr-ed-media') || '[]'); // [{name, type, blobKey, size}]

const DB_NAME = 'pr-editor-audio';
const STORE = 'blobs';
const META_KEY = 'pr-editor-meta';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function storeBlob(key, blob) {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).put(blob, key);
  return new Promise((r, e) => { tx.oncomplete = r; tx.onerror = () => e(tx.error); });
}
async function loadBlob(key) {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readonly');
  const req = tx.objectStore(STORE).get(key);
  return new Promise((r, e) => { tx.oncomplete = () => r(req.result); tx.onerror = () => e(tx.error); });
}
async function deleteBlob(key) {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).delete(key);
  return new Promise((r, e) => { tx.oncomplete = r; tx.onerror = () => e(tx.error); });
}
async function clearBlobs() {
  const db = await openDB();
  const tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).clear();
  return new Promise((r, e) => { tx.oncomplete = r; tx.onerror = () => e(tx.error); });
}

function saveMeta() {
  localStorage.setItem(META_KEY, JSON.stringify(waypoints));
}
function loadMeta() {
  const raw = localStorage.getItem(META_KEY);
  if (raw) { try { waypoints = JSON.parse(raw); } catch(e) {} }
}

// restore title
document.getElementById('toolbarTitle').textContent = tourTitle || 'My Tour';

// --- Map ---
map = L.map('map', { zoomControl: false }).setView([59.437, 24.745], 15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM &copy; CARTO',
  subdomains: 'abcd', maxZoom: 20
}).addTo(map);

// --- GPS position ---
let gpsMarker = null;
let gpsCircle = null;
if ('geolocation' in navigator) {
  navigator.geolocation.watchPosition(function(pos) {
    const latlng = [pos.coords.latitude, pos.coords.longitude];
    const acc = pos.coords.accuracy;
    if (gpsMarker) {
      gpsMarker.setLatLng(latlng);
      gpsCircle.setLatLng(latlng).setRadius(acc);
    } else {
      gpsCircle = L.circle(latlng, { radius: acc, color: '#4a90d9', fillColor: '#4a90d9', fillOpacity: 0.1, weight: 1 }).addTo(map);
      gpsMarker = L.circleMarker(latlng, { radius: 6, color: '#fff', fillColor: '#4a90d9', fillOpacity: 1, weight: 2 }).addTo(map);
      gpsMarker.setZIndexOffset(1000);
      document.getElementById('gps-btn').classList.add('has-fix');
    }
  }, function() {}, { enableHighAccuracy: true, maximumAge: 5000 });
}

function centerOnGps() {
  if (gpsMarker) {
    map.setView(gpsMarker.getLatLng(), Math.max(map.getZoom(), 16));
  }
}

map.on('click', function(e) {
  if (window._adjustMode) return; // handled by adjust handler
  // check if click is near an existing waypoint
  const clickLatLng = e.latlng;
  let nearestIdx = -1;
  let nearestDist = Infinity;
  waypoints.forEach((wp, i) => {
    const d = map.distance(clickLatLng, L.latLng(wp.trigger.coords));
    if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
  });
  // if within the waypoint radius, open editor
  if (nearestIdx >= 0 && nearestDist <= (waypoints[nearestIdx].trigger.radius_m || 20) * 1.5) {
    openWaypointPanel(nearestIdx);
  } else {
    // show popup to add waypoint
    L.popup({ closeButton: true, className: 'add-wp-popup' })
      .setLatLng(clickLatLng)
      .setContent(`<button onclick="addWaypoint(${clickLatLng.lat},${clickLatLng.lng});this.closest('.leaflet-popup').remove()" style="background:#5cb85c;color:#fff;border:none;border-radius:6px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;min-height:44px">Add waypoint here</button>`)
      .openOn(map);
  }
});

function generateId() {
  return 'wp-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 6);
}

function addWaypoint(lat, lng) {
  const wp = {
    id: generateId(),
    name: 'Waypoint ' + (waypoints.length + 1),
    trigger: { type: 'gps', coords: [lat, lng], radius_m: 20 },
    requires: [],
    same_audio: true,
    tracks_on: { atmo: null, sfx: null, dialogue: null, vo: null },
    tracks_off: { atmo: null, sfx: null, dialogue: null, vo: null },
    _meta: {} // provenance metadata for tracks
  };
  waypoints.push(wp);
  saveMeta();
  renderMap();
  openWaypointPanel(waypoints.length - 1);
}

function renderMap() {
  // Clear existing layers
  wpLayers.forEach(l => map.removeLayer(l));
  arrowLayers.forEach(l => map.removeLayer(l));
  wpLayers = [];
  arrowLayers = [];

  waypoints.forEach((wp, i) => {
    const coords = wp.trigger.coords;
    const hasPrereqs = wp.requires && wp.requires.length > 0;
    const color = hasPrereqs ? '#337ab7' : '#5cb85c';

    // Radius circle
    const circle = L.circle(coords, {
      radius: wp.trigger.radius_m || 20,
      color: color, fillColor: color, fillOpacity: 0.15, weight: 2
    }).addTo(map);

    // Center marker
    const marker = L.circleMarker(coords, {
      radius: 8, color: color, fillColor: color, fillOpacity: 0.8, weight: 2
    }).addTo(map);

    // Label
    const label = hasPrereqs ? `[${wp.requires.length}] ${wp.name}` : wp.name;
    marker.bindTooltip(label, { permanent: true, direction: 'top', className: 'wp-tooltip', offset: [0, -10] });

    marker.on('click', function(e) {
      L.DomEvent.stopPropagation(e);
      openWaypointPanel(i);
    });

    wpLayers.push(circle, marker);

    // Prerequisite arrows
    if (wp.requires) {
      wp.requires.forEach(reqId => {
        const reqWp = waypoints.find(w => w.id === reqId);
        if (reqWp) {
          const arrow = L.polyline(
            [reqWp.trigger.coords, coords],
            { color: '#f0ad4e', weight: 2, dashArray: '6 4', opacity: 0.6 }
          ).addTo(map);
          arrowLayers.push(arrow);
        }
      });
    }
  });

  // Inject tooltip styles
  if (!document.getElementById('tooltip-style')) {
    const s = document.createElement('style');
    s.id = 'tooltip-style';
    s.textContent = '.wp-tooltip{background:#1a1a1a!important;color:#eee!important;border:1px solid #333!important;border-radius:4px!important;font-size:.75em!important;padding:4px 8px!important}.wp-tooltip::before{border-top-color:#333!important}';
    document.head.appendChild(s);
  }
}

// --- Panel ---
function openWaypointPanel(index) {
  selectedWp = index;
  activeAudioSet = 'on';
  const wp = waypoints[index];

  document.getElementById('panel-title').textContent = wp.name || 'Waypoint';
  document.getElementById('panel-body').innerHTML = buildPanelHTML(wp, index);
  document.getElementById('panel-overlay').style.display = 'block';
  document.getElementById('panel').style.display = 'block';
  // draw waveforms after DOM is ready
  requestAnimationFrame(() => drawTrackWaveforms());
}

function closePanel() {
  document.getElementById('panel-overlay').style.display = 'none';
  document.getElementById('panel').style.display = 'none';
  stopTrack();
  selectedWp = null;
}

function buildPanelHTML(wp, index) {
  const prereqOptions = waypoints
    .filter((w, i) => i !== index && !(wp.requires || []).includes(w.id))
    .map(w => `<option value="${w.id}">${w.name || w.id}</option>`)
    .join('');

  const prereqList = (wp.requires || []).map(id => {
    const w = waypoints.find(x => x.id === id);
    return `<li><span style="flex:1">${w ? w.name : id}</span><button class="btn-red" onclick="removePrereq(${index},'${id}')">Remove</button></li>`;
  }).join('');

  const showTabs = wp.requires && wp.requires.length > 0 && !wp.same_audio;

  let html = `
    <label>Name</label>
    <input type="text" value="${wp.name || ''}" onchange="updateWpField(${index},'name',this.value)">

    <div style="display:flex;gap:8px">
      <div style="flex:1"><label>Latitude</label><input type="number" step="0.00001" value="${wp.trigger.coords[0]}" onchange="updateCoord(${index},0,parseFloat(this.value))"></div>
      <div style="flex:1"><label>Longitude</label><input type="number" step="0.00001" value="${wp.trigger.coords[1]}" onchange="updateCoord(${index},1,parseFloat(this.value))"></div>
    </div>

    <label>Trigger Radius: <span id="radius-val">${wp.trigger.radius_m || 20}</span>m</label>
    <input type="range" min="5" max="100" value="${wp.trigger.radius_m || 20}" oninput="document.getElementById('radius-val').textContent=this.value" onchange="updateRadius(${index},parseInt(this.value))">

    <label>Prerequisites</label>
    <div style="display:flex;gap:4px">
      <select id="prereq-select" style="flex:1">${prereqOptions ? '<option value="">Add prerequisite...</option>' + prereqOptions : '<option value="">No other waypoints</option>'}</select>
      <button class="btn-blue" onclick="addPrereq(${index})" style="padding:8px 12px">Add</button>
    </div>
    <ul class="prereq-list">${prereqList}</ul>
  `;

  if (wp.requires && wp.requires.length > 0) {
    html += `
      <div class="checkbox-row">
        <input type="checkbox" id="same-audio" ${wp.same_audio ? 'checked' : ''} onchange="toggleSameAudio(${index},this.checked)">
        <label for="same-audio" style="margin:0">Same audio for both states</label>
      </div>
    `;
  }

  if (showTabs) {
    html += `
      <div class="audio-tabs">
        <button class="audio-tab on ${activeAudioSet === 'on' ? 'active-tab' : ''}" onclick="switchAudioSet('on',${index})">On-Track</button>
        <button class="audio-tab off ${activeAudioSet === 'off' ? 'active-tab' : ''}" onclick="switchAudioSet('off',${index})">Off-Track</button>
      </div>
    `;
  }

  html += '<div style="margin-top:12px">' + buildTrackRows(wp, index) + '</div>';

  html += `
    <div class="delete-section">
      <button class="btn-amber-outline" onclick="adjustWaypoint(${index})" style="flex:1">Adjust Position</button>
      <button class="btn-red" onclick="deleteWaypoint(${index})" style="flex:1">Delete</button>
    </div>
  `;

  return html;
}

function buildTrackRows(wp, index) {
  const set = activeAudioSet;
  const tracks = set === 'on' ? wp.tracks_on : wp.tracks_off;
  const trackTypes = ['atmo', 'sfx', 'dialogue', 'vo'];
  const meta = wp._meta || {};

  return trackTypes.map(type => {
    const key = `${set}/${type}`;
    const file = tracks[type];
    const trackMeta = meta[key];

    let metaDisplay = '';
    if (trackMeta) {
      const parts = [];
      if (trackMeta.location) parts.push(`${trackMeta.location.lat.toFixed(4)}, ${trackMeta.location.lng.toFixed(4)}`);
      if (trackMeta.recorded_at) parts.push(new Date(trackMeta.recorded_at).toLocaleDateString());
      if (trackMeta.duration_s) parts.push(trackMeta.duration_s.toFixed(1) + 's');
      if (trackMeta.recorder && trackMeta.recorder.pubkey) parts.push('key:' + trackMeta.recorder.pubkey.substring(0, 8) + '...');
      if (trackMeta.tags && trackMeta.tags.length) parts.push(trackMeta.tags.join(', '));
      metaDisplay = `<div class="track-meta">${parts.join(' | ')}</div>`;
    }

    const canvasId = `wave-${index}-${set}-${type}`;
    const waveSection = file ? `
      <div class="track-wave-wrap" onclick="seekTrack(event,${index},'${set}','${type}')">
        <canvas id="${canvasId}" width="600" height="48"></canvas>
        <div class="track-playhead" id="ph-${canvasId}"></div>
      </div>
      <div class="track-transport">
        <button class="btn-green" onclick="playTrack(${index},'${set}','${type}')" id="tbtn-${canvasId}">&#9654;</button>
        <button class="btn-dark" onclick="stopTrack()">&#9632;</button>
      </div>
    ` : '';

    return `
      <div class="track-row">
        <div class="track-header">
          <span class="track-label">${type}</span>
          <div style="flex:1">
            <div class="track-file">${file || '—'}</div>
            ${metaDisplay}
          </div>
          <div class="track-buttons">
            <button class="btn-blue" onclick="browseRecorderLibrary(${index},'${set}','${type}')">Library</button>
            ${file ? `<button class="btn-red" onclick="removeTrack(${index},'${set}','${type}')">Del</button>` : ''}
          </div>
        </div>
        ${waveSection}
      </div>
    `;
  }).join('');
}

// --- Waypoint operations ---
function updateWpField(index, field, value) {
  waypoints[index][field] = value;
  saveMeta(); renderMap();
  document.getElementById('panel-title').textContent = value;
}

function updateCoord(index, pos, value) {
  waypoints[index].trigger.coords[pos] = value;
  saveMeta(); renderMap();
}

function updateRadius(index, value) {
  waypoints[index].trigger.radius_m = value;
  saveMeta(); renderMap();
}

function addPrereq(index) {
  const sel = document.getElementById('prereq-select');
  const val = sel.value;
  if (!val) return;
  if (!waypoints[index].requires) waypoints[index].requires = [];
  if (!waypoints[index].requires.includes(val)) {
    waypoints[index].requires.push(val);
    saveMeta(); renderMap();
    openWaypointPanel(index);
  }
}

function removePrereq(index, id) {
  waypoints[index].requires = (waypoints[index].requires || []).filter(x => x !== id);
  saveMeta(); renderMap();
  openWaypointPanel(index);
}

function toggleSameAudio(index, checked) {
  waypoints[index].same_audio = checked;
  saveMeta();
  openWaypointPanel(index);
}

function switchAudioSet(set, index) {
  activeAudioSet = set;
  openWaypointPanel(index);
}

function deleteWaypoint(index) {
  if (!confirm('Delete this waypoint?')) return;
  const id = waypoints[index].id;
  waypoints.splice(index, 1);
  // Clean up prerequisites referencing this waypoint
  waypoints.forEach(wp => {
    wp.requires = (wp.requires || []).filter(x => x !== id);
  });
  saveMeta(); renderMap();
  closePanel();
}

function adjustWaypoint(index) {
  closePanel();
  window._adjustMode = true;
  const wp = waypoints[index];
  const coords = wp.trigger.coords;

  renderMap();

  const markerIcon = L.divIcon({
    className: '',
    html: '<div style="width:20px;height:20px;background:#f0ad4e;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px #0008"></div>',
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  });

  const dragMarker = L.marker(coords, { draggable: true, icon: markerIcon }).addTo(map);

  const previewCircle = L.circle(coords, {
    radius: wp.trigger.radius_m || 20,
    color: '#f0ad4e', fillColor: '#f0ad4e', fillOpacity: 0.15, weight: 2, dashArray: '6 4'
  }).addTo(map);

  function moveToPos(latlng) {
    dragMarker.setLatLng(latlng);
    previewCircle.setLatLng(latlng);
  }

  dragMarker.on('drag', function(e) { previewCircle.setLatLng(e.target.getLatLng()); });

  // Click map to jump waypoint there
  function onMapClick(e) { moveToPos(e.latlng); }
  map.on('click', onMapClick);

  // Banner
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#f0ad4e;color:#111;text-align:center;padding:12px;z-index:5000;font-weight:600;font-size:.9em;display:flex;align-items:center;justify-content:center;gap:12px';
  banner.innerHTML = `
    <span>Tap or drag to reposition</span>
    <button onclick="confirmAdjust()" style="background:#111;color:#f0ad4e;border:none;border-radius:6px;padding:8px 16px;font-weight:600;cursor:pointer;min-height:36px">Done</button>
    <button onclick="cancelAdjust()" style="background:transparent;color:#111;border:2px solid #111;border-radius:6px;padding:8px 16px;font-weight:600;cursor:pointer;min-height:36px">Cancel</button>
  `;
  document.body.appendChild(banner);

  window._adjustState = { index, dragMarker, previewCircle, banner, onMapClick, originalCoords: [...coords] };
}

function _cleanupAdjust() {
  const s = window._adjustState;
  if (!s) return;
  map.off('click', s.onMapClick);
  map.removeLayer(s.dragMarker);
  map.removeLayer(s.previewCircle);
  s.banner.remove();
  window._adjustState = null;
  window._adjustMode = false;
}

function confirmAdjust() {
  const s = window._adjustState;
  if (!s) return;
  const pos = s.dragMarker.getLatLng();
  waypoints[s.index].trigger.coords = [Math.round(pos.lat * 1e6) / 1e6, Math.round(pos.lng * 1e6) / 1e6];
  saveMeta();
  _cleanupAdjust();
  renderMap();
}

function cancelAdjust() {
  _cleanupAdjust();
  renderMap();
}

// --- Audio operations ---
// Recorder library DB (shared with recorder.html)
const REC_DB_NAME = 'pr-recorder';
const REC_STORE = 'clips';

function openRecorderDB() {
  return new Promise((resolve, reject) => {
    // Open without version to match whatever version exists
    const req = indexedDB.open(REC_DB_NAME);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(REC_STORE)) {
        db.createObjectStore(REC_STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function getRecorderClips() {
  const db = await openRecorderDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(REC_STORE, 'readonly');
    const req = tx.objectStore(REC_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function saveToRecorderDB(clip) {
  const db = await openRecorderDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(REC_STORE, 'readwrite');
    tx.objectStore(REC_STORE).put(clip);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function browseRecorderLibrary(wpIndex, set, track) {
  currentLibTarget = { wpIndex, set, track };
  const clips = await getRecorderClips();

  let html = '';
  if (clips.length === 0) {
    html = '<p style="color:#666;font-size:.85em;padding:16px;text-align:center">No recordings in library. Use the Recorder to create or import audio.</p>';
  } else {
    html = '<p style="color:#888;font-size:.85em;margin-bottom:12px">Select a recording:</p>';
    clips.forEach((c, i) => {
      const meta = c.meta || {};
      const tags = (meta.tags || []).join(', ');
      const loc = meta.location ? `${meta.location.lat.toFixed(4)}, ${meta.location.lng.toFixed(4)}` : '';
      html += `<div class="lib-track-item" onclick="pickFromRecorderLib('${c.id}')" style="cursor:pointer">
        <div style="flex:1">
          <div style="color:#fff;font-weight:600;font-size:.9em">${c.name || 'Untitled'}</div>
          <div style="color:#888;font-size:.75em">${(meta.duration_s || 0).toFixed(1)}s${loc ? ' | ' + loc : ''}${tags ? ' | ' + tags : ''}</div>
        </div>
        <span style="color:#5cb85c;font-size:.8em">${meta.source || ''}</span>
      </div>`;
    });
  }

  document.getElementById('lib-body').innerHTML = html;
  document.getElementById('lib-overlay').style.display = 'block';
  document.getElementById('lib-panel').style.display = 'block';
}

async function pickFromRecorderLib(clipId) {
  if (!currentLibTarget) return;
  const clips = await getRecorderClips();
  const clip = clips.find(c => c.id === clipId);
  const audioBlob = clip.wav || clip.wavBlob;
  if (!clip || !audioBlob) { alert('Clip has no audio data'); return; }

  const { wpIndex, set, track } = currentLibTarget;
  const wp = waypoints[wpIndex];
  const key = `wp-${wpIndex}-${set}-${track}-rec-${clip.name || clipId}`;
  await storeBlob(key, audioBlob);

  const tracks = set === 'on' ? wp.tracks_on : wp.tracks_off;
  tracks[track] = `${track}/${set}/${clip.name || clipId}.wav`;
  if (!wp._blobKeys) wp._blobKeys = {};
  wp._blobKeys[`${set}/${track}`] = key;

  if (clip.meta) {
    if (!wp._meta) wp._meta = {};
    wp._meta[`${set}/${track}`] = clip.meta;
  }

  saveMeta();
  closeLibrary();
  openWaypointPanel(wpIndex);
}

function removeTrack(wpIndex, set, track) {
  const wp = waypoints[wpIndex];
  const tracks = set === 'on' ? wp.tracks_on : wp.tracks_off;
  const blobKey = wp._blobKeys && wp._blobKeys[`${set}/${track}`];
  if (blobKey) deleteBlob(blobKey);
  tracks[track] = null;
  if (wp._meta) delete wp._meta[`${set}/${track}`];
  saveMeta(); openWaypointPanel(wpIndex);
}

// --- Track audio preview with waveform ---
let trackAudioCtx = null;
let trackPlaySource = null;
let trackPlayingId = null;
let trackPlayStartTime = 0;
let trackPlayOffset = 0;
let trackPlayDuration = 0;
let trackPlayRAF = null;
let trackPausedAt = 0; // remembers position on pause
let trackPausedId = null; // which track was paused
let trackPausedArgs = null; // [wpIndex, set, track] for resume

function ensureTrackCtx() {
  if (!trackAudioCtx || trackAudioCtx.state === 'closed')
    trackAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (trackAudioCtx.state === 'suspended') trackAudioCtx.resume();
  return trackAudioCtx;
}

function stopAudioPreview() { stopTrack(); }

function stopTrack() {
  if (trackPlaySource) { try { trackPlaySource.stop(); } catch(e) {} trackPlaySource = null; }
  if (trackPlayRAF) { cancelAnimationFrame(trackPlayRAF); trackPlayRAF = null; }
  // reset playhead
  const resetId = trackPlayingId || trackPausedId;
  if (resetId) {
    const ph = document.getElementById('ph-' + resetId);
    if (ph) ph.style.left = '0';
    const btn = document.getElementById('tbtn-' + resetId);
    if (btn) btn.innerHTML = '&#9654;';
  }
  trackPlayingId = null;
  trackPausedId = null;
  trackPausedAt = 0;
  trackPausedArgs = null;
}

async function playTrack(wpIndex, set, track, startOffset) {
  const canvasId = `wave-${wpIndex}-${set}-${track}`;

  // if already playing this track, pause and remember position
  if (trackPlayingId === canvasId) {
    const ctx = ensureTrackCtx();
    trackPausedAt = ctx.currentTime - trackPlayStartTime + trackPlayOffset;
    trackPausedId = canvasId;
    trackPausedArgs = [wpIndex, set, track];
    if (trackPlaySource) { try { trackPlaySource.stop(); } catch(e) {} trackPlaySource = null; }
    if (trackPlayRAF) { cancelAnimationFrame(trackPlayRAF); trackPlayRAF = null; }
    const btn = document.getElementById('tbtn-' + canvasId);
    if (btn) btn.innerHTML = '&#9654;';
    trackPlayingId = null;
    return;
  }

  // if resuming a paused track (same track, no explicit offset)
  if (startOffset === undefined && trackPausedId === canvasId && trackPausedAt > 0) {
    startOffset = trackPausedAt;
    trackPausedId = null;
    trackPausedAt = 0;
  }

  stopTrack();

  const wp = waypoints[wpIndex];
  const blobKey = wp._blobKeys && wp._blobKeys[`${set}/${track}`];
  if (!blobKey) return;
  const blob = await loadBlob(blobKey);
  if (!blob) return;

  const ctx = ensureTrackCtx();
  const arrayBuf = await blob.arrayBuffer();
  const audioBuf = await ctx.decodeAudioData(arrayBuf);

  const offset = startOffset || 0;
  trackPlaySource = ctx.createBufferSource();
  trackPlaySource.buffer = audioBuf;
  trackPlaySource.connect(ctx.destination);
  trackPlaySource.start(0, offset);

  trackPlayingId = canvasId;
  trackPlayStartTime = ctx.currentTime;
  trackPlayOffset = offset;
  trackPlayDuration = audioBuf.duration;

  const btn = document.getElementById('tbtn-' + canvasId);
  if (btn) btn.innerHTML = '&#9646;&#9646;';

  trackPlaySource.onended = () => {
    if (trackPlayingId === canvasId) stopTrack();
  };

  // animate playhead
  function animatePlayhead() {
    if (trackPlayingId !== canvasId) return;
    const elapsed = ctx.currentTime - trackPlayStartTime + trackPlayOffset;
    const ratio = Math.min(1, elapsed / trackPlayDuration);
    const ph = document.getElementById('ph-' + canvasId);
    if (ph) ph.style.left = (ratio * 100) + '%';
    trackPlayRAF = requestAnimationFrame(animatePlayhead);
  }
  animatePlayhead();
}

function seekTrack(event, wpIndex, set, track) {
  const canvas = event.currentTarget.querySelector('canvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const ratio = (event.clientX - rect.left) / rect.width;

  // get duration from metadata or estimate
  const wp = waypoints[wpIndex];
  const meta = wp._meta?.[`${activeAudioSet}/${track}`];
  const dur = meta?.duration_s || 30;

  playTrack(wpIndex, set, track, ratio * dur);
}

async function drawTrackWaveforms() {
  // called after panel renders — draws waveforms for all tracks that have audio
  const wp = waypoints[selectedWp];
  if (!wp) return;
  const set = activeAudioSet;
  const trackTypes = ['atmo', 'sfx', 'dialogue', 'vo'];

  for (const type of trackTypes) {
    const canvasId = `wave-${selectedWp}-${set}-${type}`;
    const canvas = document.getElementById(canvasId);
    if (!canvas) continue;

    const blobKey = wp._blobKeys?.[`${set}/${type}`];
    if (!blobKey) continue;
    const blob = await loadBlob(blobKey);
    if (!blob) continue;

    try {
      const ctx = ensureTrackCtx();
      const arrayBuf = await blob.arrayBuffer();
      const audioBuf = await ctx.decodeAudioData(arrayBuf);
      drawMiniWaveform(canvas, audioBuf);
    } catch(e) { /* skip undecodable */ }
  }
}

function drawMiniWaveform(canvas, audioBuf) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const c = canvas.getContext('2d');
  c.scale(dpr, dpr);
  const w = rect.width, h = rect.height;

  c.fillStyle = '#1a1a1a';
  c.fillRect(0, 0, w, h);

  const data = audioBuf.getChannelData(0);
  const step = Math.max(1, Math.ceil(data.length / w));
  const mid = h / 2;

  c.strokeStyle = '#5cb85c';
  c.lineWidth = 1;
  c.beginPath();
  for (let x = 0; x < w; x++) {
    const idx = Math.floor(x * data.length / w);
    let min = 1, max = -1;
    for (let j = 0; j < step && idx + j < data.length; j++) {
      const val = data[idx + j];
      if (val < min) min = val;
      if (val > max) max = val;
    }
    c.moveTo(x, mid + min * mid);
    c.lineTo(x, mid + max * mid);
  }
  c.stroke();

  // center line
  c.strokeStyle = '#333';
  c.lineWidth = 0.5;
  c.beginPath(); c.moveTo(0, mid); c.lineTo(w, mid); c.stroke();
}

function addMedia() {
  const totalBytes = tourMedia.reduce((s, m) => s + (m.size || 0), 0);
  if (totalBytes >= MAX_MEDIA_BYTES) { alert('Media limit reached (10MB). Remove something first.'); return; }
  document.getElementById('media-file').click();
}

async function handleMediaUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const totalBytes = tourMedia.reduce((s, m) => s + (m.size || 0), 0);
  if (totalBytes + file.size > MAX_MEDIA_BYTES) {
    alert('File too large. ' + ((MAX_MEDIA_BYTES - totalBytes) / 1024 / 1024).toFixed(1) + ' MB remaining.');
    return;
  }

  const blobKey = 'tour-media-' + Date.now().toString(36) + '-' + file.name;
  await storeBlob(blobKey, file);

  tourMedia.push({ name: file.name, type: file.type, blobKey, size: file.size });
  localStorage.setItem('pr-ed-media', JSON.stringify(tourMedia));
  renderMediaGrid();
}

function removeMedia(index) {
  const m = tourMedia[index];
  if (m.blobKey) deleteBlob(m.blobKey);
  tourMedia.splice(index, 1);
  localStorage.setItem('pr-ed-media', JSON.stringify(tourMedia));
  renderMediaGrid();
}

// --- Python parser (same as index.html) ---
function extractPythonValueForLib(text, varName) {
  const pattern = new RegExp('(?:^|\\n)' + varName + '\\s*=\\s*', 'g');
  const match = pattern.exec(text);
  if (!match) return null;
  let start = match.index + match[0].length;
  const firstChar = text[start];

  if (firstChar === '"' || firstChar === "'") {
    let end = start + 1;
    while (end < text.length && text[end] !== firstChar) { if (text[end] === '\\') end++; end++; }
    return text.substring(start + 1, end);
  }
  if (firstChar !== '{' && firstChar !== '[') {
    if (text.substring(start, start + 4) === 'True') return true;
    if (text.substring(start, start + 5) === 'False') return false;
    if (text.substring(start, start + 4) === 'None') return null;
    const nm = text.substring(start).match(/^[\d.\-eE]+/);
    if (nm) return parseFloat(nm[0]);
    return null;
  }

  let depth = 0, i = start, inStr = false, strChar = '';
  const openers = new Set(['{', '[', '(']);
  const closers = new Set(['}', ']', ')']);
  while (i < text.length) {
    const c = text[i];
    if (inStr) { if (c === '\\') { i += 2; continue; } if (c === strChar) inStr = false; }
    else {
      if (c === '#') { while (i < text.length && text[i] !== '\n') i++; continue; }
      if (c === '"' || c === "'") { inStr = true; strChar = c; }
      else if (openers.has(c)) depth++;
      else if (closers.has(c)) { depth--; if (depth === 0) {
        const raw = text.substring(start, i + 1);
        let json = raw.replace(/#[^\n]*/g, '').replace(/True/g, 'true').replace(/False/g, 'false').replace(/None/g, 'null').replace(/'/g, '"').replace(/,\s*([\]})]])/g, '$1');
        try { return JSON.parse(json); } catch(e) { return null; }
      }}
    }
    i++;
  }
  return null;
}

// --- Save ---
async function sha256hex(data) {
  const buf = await crypto.subtle.digest('SHA-256', typeof data === 'string' ? new TextEncoder().encode(data) : data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function newTour() {
  if (!confirm('Start a new tour? All unsaved changes will be lost.')) return;
  waypoints = [];
  tourTitle = 'My Tour';
  tourDescription = '';
  tourMedia = [];
  localStorage.removeItem(META_KEY);
  localStorage.removeItem('pr-ed-title');
  localStorage.removeItem('pr-ed-desc');
  localStorage.removeItem('pr-ed-media');
  document.getElementById('toolbarTitle').textContent = tourTitle;
  renderMap();
}

async function saveTour() {
  if (waypoints.length === 0) { alert('Add at least one waypoint first.'); return; }

  const identity = JSON.parse(localStorage.getItem('pr-identity') || '{}');
  const zip = new JSZip();
  const manifestFiles = {};

  // Collect contributors from track metadata
  const contributorSet = new Set();
  if (identity.handle) contributorSet.add(identity.handle);

  // Add audio files
  for (let i = 0; i < waypoints.length; i++) {
    const wp = waypoints[i];
    for (const setType of ['on', 'off']) {
      const tracks = setType === 'on' ? wp.tracks_on : wp.tracks_off;
      if (!tracks) continue;
      for (const [ttype, tpath] of Object.entries(tracks)) {
        if (!tpath) continue;
        const blobKey = wp._blobKeys && wp._blobKeys[`${setType}/${ttype}`];
        if (!blobKey) continue;
        const blob = await loadBlob(blobKey);
        if (!blob) continue;
        const arrayBuf = await blob.arrayBuffer();
        zip.file(tpath, arrayBuf);

        try {
          const hash = await sha256hex(arrayBuf);
          manifestFiles[tpath] = { sha256: hash, size: arrayBuf.byteLength };
        } catch(e) {
          // crypto.subtle may fail on plain HTTP
          manifestFiles[tpath] = { sha256: 'unavailable', size: arrayBuf.byteLength };
        }

        // Add sidecar JSON if provenance exists
        const meta = wp._meta && wp._meta[`${setType}/${ttype}`];
        if (meta) {
          const sidecarPath = tpath.replace(/\.[^.]+$/, '.json');
          zip.file(sidecarPath, JSON.stringify(meta, null, 2));
          if (meta.recorder && meta.recorder.pubkey) {
            contributorSet.add(meta.recorder.pubkey.substring(0, 8) + '...');
          }
        }
      }
    }
  }

  // Build WAYPOINTS for cartridge.py (strip internal fields)
  const cleanWaypoints = waypoints.map(wp => ({
    id: wp.id,
    name: wp.name,
    trigger: wp.trigger,
    requires: wp.requires || [],
    same_audio: wp.same_audio !== false,
    tracks_on: wp.tracks_on,
    tracks_off: wp.tracks_off
  }));

  const tourDef = {
    id: tourTitle.replace(/[^a-z0-9]/gi, '-').toLowerCase() || 'tour-' + Date.now().toString(36),
    title: tourTitle || 'Untitled Tour',
    description: tourDescription || '',
    skin: 'default',
    global_atmo: null,
    media: tourMedia.map(m => 'media/' + m.name)
  };

  const contributors = Array.from(contributorSet);

  const cartridge = `"""Pavement Radio Tour Cartridge"""

# --- identity ---
AUTHOR = "${identity.handle || 'anonymous'}"
PUBKEY = "${identity.pubkey || ''}"
SIGNATURE = ""
SIGNED_AT = "${new Date().toISOString()}"
MANIFEST_HASH = ""

# --- contributors ---
CONTRIBUTORS = ${JSON.stringify(contributors)}

# --- tour definition ---
TOUR = ${JSON.stringify(tourDef, null, 4)}

WAYPOINTS = ${JSON.stringify(cleanWaypoints, null, 4)}

REVENUE_SPLIT = {
    "tour_maker": 0.70,
    "platform": 0.20,
    "settlement": 0.10
}

# --- self-verification ---
if __name__ == "__main__":
    import hashlib, json, os, sys
    def verify():
        cart_dir = os.path.dirname(os.path.abspath(__file__))
        manifest_path = os.path.join(cart_dir, "manifest.json")
        if not os.path.exists(manifest_path):
            print("No manifest.json found.")
            return False
        manifest_bytes = open(manifest_path, "rb").read()
        if MANIFEST_HASH and hashlib.sha256(manifest_bytes).hexdigest() != MANIFEST_HASH:
            print("FAIL: manifest.json modified since signing.")
            return False
        manifest = json.loads(manifest_bytes)
        for filepath, entry in manifest["files"].items():
            full_path = os.path.join(cart_dir, filepath)
            if not os.path.exists(full_path):
                print(f"FAIL: missing {filepath}")
                return False
            data = open(full_path, "rb").read()
            if len(data) != entry["size"]:
                print(f"FAIL: size mismatch {filepath}")
                return False
            if entry["sha256"] != "unavailable" and hashlib.sha256(data).hexdigest() != entry["sha256"]:
                print(f"FAIL: checksum mismatch {filepath}")
                return False
        print(f"OK: {len(manifest['files'])} files verified.")
        print(f"    tour: {TOUR['title']}")
        return True
    sys.exit(0 if verify() else 1)
`;

  zip.file('cartridge.py', cartridge);

  // Add media files
  for (const m of tourMedia) {
    const blob = await loadBlob(m.blobKey);
    if (blob) {
      zip.file('media/' + m.name, blob);
    }
  }

  // Add description as markdown file
  if (tourDescription) {
    zip.file('description.md', tourDescription);
  }

  const manifest = {
    version: 1,
    tour_id: tourDef.id,
    created_at: new Date().toISOString(),
    files: manifestFiles
  };
  zip.file('manifest.json', JSON.stringify(manifest, null, 2));

  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (tourDef.title || 'tour').replace(/[^a-z0-9]/gi, '-').toLowerCase() + '.pr';
  a.click();
  URL.revokeObjectURL(url);
}

// --- Open ---
function openTour() {
  document.getElementById('open-file').click();
}

async function handleOpen(event) {
  const file = event.target.files[0];
  if (!file) return;

  try {
    const zip = await JSZip.loadAsync(file);
    const cartridgeFile = zip.file('cartridge.py');
    if (!cartridgeFile) { alert('No cartridge.py in archive'); return; }

    const text = await cartridgeFile.async('text');
    const loadedTour = extractPythonValueForLib(text, 'TOUR');
    if (loadedTour?.title) {
      tourTitle = loadedTour.title;
      document.getElementById('toolbarTitle').textContent = tourTitle;
      localStorage.setItem('pr-ed-title', tourTitle);
    }
    tourDescription = loadedTour?.description || '';
    // try loading description.md
    const descFile = zip.file('description.md');
    if (descFile) tourDescription = await descFile.async('text');
    localStorage.setItem('pr-ed-desc', tourDescription);

    const loadedWaypoints = extractPythonValueForLib(text, 'WAYPOINTS') || [];

    await clearBlobs();

    // Load media files (after clearBlobs)
    tourMedia = [];
    const mediaFiles = Object.keys(zip.files).filter(f => f.startsWith('media/') && !zip.files[f].dir);
    for (const mpath of mediaFiles) {
      const blob = await zip.file(mpath).async('blob');
      const fname = mpath.split('/').pop();
      const blobKey = 'tour-media-' + Date.now().toString(36) + '-' + fname;
      await storeBlob(blobKey, blob);
      tourMedia.push({ name: fname, type: blob.type, blobKey, size: blob.size });
    }
    localStorage.setItem('pr-ed-media', JSON.stringify(tourMedia));
    waypoints = [];

    for (let i = 0; i < loadedWaypoints.length; i++) {
      const lw = loadedWaypoints[i];
      lw._meta = {};
      lw._blobKeys = {};

      for (const setType of ['on', 'off']) {
        const tracks = setType === 'on' ? lw.tracks_on : lw.tracks_off;
        if (!tracks) continue;
        for (const [ttype, tpath] of Object.entries(tracks)) {
          if (!tpath) continue;
          const zipEntry = zip.file(tpath);
          if (zipEntry) {
            const blob = await zipEntry.async('blob');
            const key = `wp-${i}-${setType}-${ttype}-${tpath.split('/').pop()}`;
            await storeBlob(key, blob);
            lw._blobKeys[`${setType}/${ttype}`] = key;
          }
          // Load sidecar
          const sidecarPath = tpath.replace(/\.[^.]+$/, '.json');
          const sidecarEntry = zip.file(sidecarPath);
          if (sidecarEntry) {
            try {
              const sidecarText = await sidecarEntry.async('text');
              lw._meta[`${setType}/${ttype}`] = JSON.parse(sidecarText);
            } catch(e) {}
          }
        }
      }

      waypoints.push(lw);
    }

    saveMeta();
    renderMap();

    // Import all audio assets into the recorder library
    let importedCount = 0;
    for (const wp of waypoints) {
      for (const setType of ['on', 'off']) {
        const tracks = setType === 'on' ? wp.tracks_on : wp.tracks_off;
        if (!tracks) continue;
        for (const [ttype, tpath] of Object.entries(tracks)) {
          if (!tpath) continue;
          const blobKey = wp._blobKeys?.[`${setType}/${ttype}`];
          if (!blobKey) continue;
          const blob = await loadBlob(blobKey);
          if (!blob) continue;
          const meta = wp._meta?.[`${setType}/${ttype}`] || {};
          const clipName = tpath.split('/').pop().replace(/\.[^.]+$/, '');
          const clipId = 'tour-' + wp.id + '-' + setType + '-' + ttype;
          await saveToRecorderDB({
            id: clipId,
            name: clipName,
            tags: meta.tags || [ttype],
            meta: { ...meta, source: meta.source || 'tour-import' },
            wavBlob: blob,
            saved_at: new Date().toISOString()
          });
          importedCount++;
        }
      }
    }

    // Fit map to waypoints
    if (waypoints.length > 0) {
      const bounds = L.latLngBounds(waypoints.map(w => w.trigger.coords));
      map.fitBounds(bounds, { padding: [40, 40] });
    }
    if (importedCount > 0) {
      console.log(`Imported ${importedCount} audio assets to recorder library`);
    }
  } catch (e) {
    alert('Error opening tour: ' + e.message);
  }
  event.target.value = '';
}

// --- Init ---
loadMeta();
renderMap();
if (waypoints.length > 0) {
  const bounds = L.latLngBounds(waypoints.map(w => w.trigger.coords));
  map.fitBounds(bounds, { padding: [40, 40] });
}
